<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Triniti — Crash</title>

  <link rel="stylesheet" href="../shared/theme.css">
  <script src="../shared/wallet.js"></script>

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg"></div>
  <div class="noise" aria-hidden="true"></div>

  <div class="app">
    <header class="topbar">
      <a class="backBtn pressable" href="../">←</a>

      <div class="brandWrap">
        <div class="brandLogo" aria-hidden="true">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="crashGoldDesktop" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#f8e8b2"/>
                <stop offset="48%" stop-color="#e0c26f"/>
                <stop offset="100%" stop-color="#b78f46"/>
              </linearGradient>
            </defs>
            <rect x="10" y="10" width="44" height="44" rx="14"
                  fill="rgba(255,255,255,.04)"
                  stroke="url(#crashGoldDesktop)"
                  stroke-width="2.2"/>
            <path d="M21 20H43L39.5 25H34V41L32 45L30 41V25H24.5L21 20Z"
                  fill="url(#crashGoldDesktop)"/>
          </svg>
        </div>

        <div class="brandText">
          <div class="brandTitle">Triniti</div>
          <div class="brandSub">Crash</div>
        </div>
      </div>

      <button id="soundBtn" class="iconBtn pressable" type="button" aria-label="Звук">
        <span id="soundDot" class="dot"></span>
      </button>

      <div class="balancePill">🪙 <b id="balance">1000</b></div>
    </header>

    <main class="screen">
      <section class="hero card">
        <div class="topStats">
          <div class="statCard">
            <div class="statCard__value" id="multVal">x1.00</div>
            <div class="statCard__label">Множитель</div>
          </div>

          <div class="statCard">
            <div class="statCard__value" id="statusVal">Раунд</div>
            <div class="statCard__label">Статус</div>
          </div>

          <div class="statCard">
            <div class="statCard__value" id="betVal">—</div>
            <div class="statCard__label">Твоя ставка</div>
          </div>
        </div>

        <section class="chartCard">
          <div class="chartTop">
            <div class="miniInfo">Раунд: <b id="statusHint">Старт через 5с</b></div>
            <div class="miniInfo">Ставка: <b id="betHint">не в раунде</b></div>
          </div>

          <div id="gamePanel" class="chartStage">
            <canvas id="graph" class="chart"></canvas>

            <div class="chartGlow chartGlow--left"></div>
            <div class="chartGlow chartGlow--right"></div>

            <div class="overlay">
              <div id="overlayX" class="overlayX">1.00x</div>
              <div id="overlayText" class="overlayText">Ты не в раунде</div>
            </div>
          </div>

          <div id="bottomLine" class="bottomLine">Новый раунд через 5с…</div>
        </section>

        <section class="betCard">
          <div class="chips">
            <button class="chip pressable" data-bet="10" type="button">10</button>
            <button class="chip pressable" data-bet="50" type="button">50</button>
            <button class="chip pressable" data-bet="100" type="button">100</button>
            <button class="chip pressable" data-bet="250" type="button">250</button>
            <button class="chip pressable" data-bet="500" type="button">500</button>
            <button class="chip pressable" data-bet="max" type="button">MAX</button>
          </div>

          <div class="betRow">
            <button id="betMinus" class="btnSmall pressable" type="button">−</button>
            <input id="betInput" class="betInput" type="number" min="1" step="1" value="100" />
            <button id="betPlus" class="btnSmall pressable" type="button">+</button>
          </div>

          <div class="actionRow">
            <button id="bonusBtn" class="bonusMini pressable" type="button">+1000</button>
            <button id="joinBtn" class="btnPrimary pressable" type="button">Войти в раунд</button>
            <button id="cashBtn" class="btnDanger pressable" type="button" disabled>Забрать</button>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
