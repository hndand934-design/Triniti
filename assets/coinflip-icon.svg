<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cfMiniBg" x1="8" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#131C34"/>
      <stop offset="0.5" stop-color="#10182B"/>
      <stop offset="1" stop-color="#0A1120"/>
    </linearGradient>

    <linearGradient id="cfGoldEdge" x1="15" y1="15" x2="34" y2="35" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF1A2"/>
      <stop offset="0.26" stop-color="#FFD84E"/>
      <stop offset="0.62" stop-color="#F8B300"/>
      <stop offset="1" stop-color="#D86D10"/>
    </linearGradient>

    <linearGradient id="cfGoldFace" x1="17" y1="15" x2="31" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF27E"/>
      <stop offset="0.35" stop-color="#FFD530"/>
      <stop offset="0.72" stop-color="#F7B400"/>
      <stop offset="1" stop-color="#E19400"/>
    </linearGradient>

    <linearGradient id="cfSilverEdge" x1="29" y1="13" x2="48" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6FAFF"/>
      <stop offset="0.22" stop-color="#DCE6F5"/>
      <stop offset="0.6" stop-color="#A0B2CB"/>
      <stop offset="1" stop-color="#687A93"/>
    </linearGradient>

    <linearGradient id="cfSilverFace" x1="31" y1="14" x2="45" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="0.34" stop-color="#DFE8F4"/>
      <stop offset="0.72" stop-color="#AAB9D0"/>
      <stop offset="1" stop-color="#7C8EA8"/>
    </linearGradient>

    <radialGradient id="cfGoldShine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(20.5 18.5) rotate(45) scale(11 8)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="0.45" stop-color="#FFF3BF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FFF3BF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="cfSilverShine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(35 17.8) rotate(45) scale(9.5 7.2)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="0.42" stop-color="#EDF5FF" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#EDF5FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="cfMiniShadow" x="0" y="0" width="64" height="64" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#050607" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#cfMiniShadow)">
    <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#cfMiniBg)"/>
  </g>

  <!-- gold coin -->
  <ellipse cx="24.5" cy="31.5" rx="11.2" ry="12.2" fill="url(#cfGoldEdge)"/>
  <ellipse cx="22" cy="27.5" rx="11.4" ry="11.4" fill="url(#cfGoldFace)"/>
  <ellipse cx="22" cy="27.5" rx="8.8" ry="8.8" fill="#F8BB09"/>
  <ellipse cx="22" cy="27.5" rx="6.7" ry="6.7" fill="url(#cfGoldFace)"/>
  <ellipse cx="22" cy="27.5" rx="9.8" ry="9.8" stroke="#FFF3AF" stroke-opacity="0.52" stroke-width="1.5"/>
  <ellipse cx="22" cy="27.5" rx="7.2" ry="7.2" stroke="#E89200" stroke-opacity="0.5" stroke-width="1.2"/>
  <ellipse cx="22" cy="27.5" rx="11.4" ry="11.4" fill="url(#cfGoldShine)"/>

  <path d="M20.2 23.7C21.4 22.7 23.1 22.4 24.9 22.8C26.7 23.2 28 24.4 28.2 26
           C28.4 27.4 27.5 28.6 25.7 29.3L20.4 31.3"
        stroke="#C87400" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
  <path d="M19.2 33C20.4 34.1 22.5 34.6 24.4 34.3C26.4 34 28 33 28.4 31.4"
        stroke="#C87400" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>

  <!-- silver coin -->
  <ellipse cx="40.5" cy="29.8" rx="9.9" ry="10.9" fill="url(#cfSilverEdge)"/>
  <ellipse cx="38" cy="25.8" rx="10.3" ry="10.3" fill="url(#cfSilverFace)"/>
  <ellipse cx="38" cy="25.8" rx="8" ry="8" fill="#C5D2E4"/>
  <ellipse cx="38" cy="25.8" rx="6.1" ry="6.1" fill="url(#cfSilverFace)"/>
  <ellipse cx="38" cy="25.8" rx="8.9" ry="8.9" stroke="#F8FCFF" stroke-opacity="0.52" stroke-width="1.4"/>
  <ellipse cx="38" cy="25.8" rx="6.5" ry="6.5" stroke="#8396B2" stroke-opacity="0.55" stroke-width="1.1"/>
  <ellipse cx="38" cy="25.8" rx="10.3" ry="10.3" fill="url(#cfSilverShine)"/>

  <path d="M36 22.4C37 21.6 38.4 21.4 39.8 21.7C41.2 22 42.2 22.9 42.4 24
           C42.5 25.1 41.8 26 40.4 26.5L36.2 28.1"
        stroke="#6E809A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M35.2 29.4C36.1 30.2 37.6 30.5 39.1 30.3C40.7 30 42 29.2 42.3 28"
        stroke="#6E809A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <rect x="4.5" y="4.5" width="55" height="55" rx="15.5" stroke="#1B2434"/>
</svg>