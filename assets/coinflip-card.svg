<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgMain" x1="92" y1="34" x2="430" y2="618" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffbb2d"/>
      <stop offset="0.34" stop-color="#ff9b0f"/>
      <stop offset="0.72" stop-color="#d66a00"/>
      <stop offset="1" stop-color="#8f3d00"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(270 156) rotate(90) scale(250 250)">
      <stop offset="0" stop-color="#fff3b6" stop-opacity="0.9"/>
      <stop offset="0.4" stop-color="#ffd667" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#ffd667" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="coinEdge" x1="171" y1="124" x2="343" y2="326" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#99600f"/>
      <stop offset="0.45" stop-color="#f1cb63"/>
      <stop offset="1" stop-color="#7e4707"/>
    </linearGradient>

    <linearGradient id="coinFace" x1="184" y1="127" x2="325" y2="281" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff2b0"/>
      <stop offset="0.52" stop-color="#f1c95e"/>
      <stop offset="1" stop-color="#bc7a18"/>
    </linearGradient>

    <linearGradient id="coinInner" x1="204" y1="147" x2="304" y2="257" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffefac"/>
      <stop offset="1" stop-color="#dd9725"/>
    </linearGradient>

    <filter id="coinShadow" x="106" y="87" width="304" height="314" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="-16" dy="24" stdDeviation="18" flood-color="#592600" flood-opacity="0.42"/>
    </filter>

    <filter id="softBlur" x="82" y="40" width="348" height="250" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16"/>
    </filter>

    <linearGradient id="shineArc" x1="95" y1="82" x2="426" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="rgba(255,255,255,0)"/>
      <stop offset="0.5" stop-color="#fff1c1"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <linearGradient id="textWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f2f2f2"/>
    </linearGradient>
  </defs>

  <rect width="512" height="640" rx="38" fill="url(#bgMain)"/>

  <g opacity="0.95" filter="url(#softBlur)">
    <ellipse cx="281" cy="132" rx="126" ry="88" fill="url(#bgGlow)"/>
  </g>

  <path d="M96 112C153 88 217 76 286 82C346 86 397 100 430 123"
        stroke="#ffe9a2" stroke-opacity="0.72" stroke-width="14" stroke-linecap="round"/>

  <g filter="url(#coinShadow)" transform="rotate(-17 257 228)">
    <ellipse cx="257" cy="231" rx="92" ry="94" fill="url(#coinEdge)"/>
    <ellipse cx="257" cy="220" rx="82" ry="82" fill="url(#coinFace)"/>
    <ellipse cx="257" cy="220" rx="58" ry="58" fill="url(#coinInner)"/>

    <circle cx="257" cy="220" r="70" stroke="#ffefb0" stroke-opacity="0.72" stroke-width="3.4"/>
    <circle cx="257" cy="220" r="49" stroke="#9f5e11" stroke-opacity="0.22" stroke-width="2.6"/>

    <!-- символ монеты -->
    <path d="M274 177C250 171 224 181 221 202C218 218 229 228 249 233C271 238 281 245 278 259C275 276 256 285 236 282C221 280 208 272 201 265"
          stroke="#8f560f" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M233 163L228 294" stroke="#8f560f" stroke-width="9.2" stroke-linecap="round"/>
  </g>

  <text x="58" y="544"
        fill="url(#textWhite)"
        font-family="Arial, Helvetica, sans-serif"
        font-size="66"
        font-weight="900"
        letter-spacing="0.5">COINFLIP</text>

  <text x="181" y="586"
        fill="#fff3d8"
        fill-opacity="0.92"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20"
        font-weight="700"
        letter-spacing="3.2">TRINITI MODE</text>
</svg>