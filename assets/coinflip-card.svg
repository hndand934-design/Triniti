<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgMain" x1="54" y1="28" x2="448" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff4b4b"/>
      <stop offset="0.28" stop-color="#ff3a34"/>
      <stop offset="0.62" stop-color="#ff7642"/>
      <stop offset="1" stop-color="#4f78ff"/>
    </linearGradient>

    <radialGradient id="sandGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(265 237) rotate(90) scale(210 198)">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset="0.52" stop-color="#ffc86d" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#ffb45a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="coinOuter" x1="177" y1="131" x2="332" y2="286" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f1f7ff"/>
      <stop offset="0.45" stop-color="#c8d4e4"/>
      <stop offset="1" stop-color="#8291a8"/>
    </linearGradient>

    <linearGradient id="coinInner" x1="199" y1="151" x2="312" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fcff"/>
      <stop offset="0.55" stop-color="#d8e0eb"/>
      <stop offset="1" stop-color="#9aa9bc"/>
    </linearGradient>

    <linearGradient id="coinStroke" x1="203" y1="145" x2="307" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9eb0c7"/>
      <stop offset="1" stop-color="#6f7f95"/>
    </linearGradient>

    <linearGradient id="symbol" x1="220" y1="175" x2="286" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dfe7f2"/>
      <stop offset="1" stop-color="#aab7ca"/>
    </linearGradient>

    <linearGradient id="textWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0f2f7"/>
    </linearGradient>

    <filter id="cardShadow" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#09101c" flood-opacity="0.28"/>
    </filter>

    <filter id="coinShadow" x="128" y="112" width="255" height="240" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="-10" dy="18" stdDeviation="12" flood-color="#734300" flood-opacity="0.30"/>
    </filter>

    <filter id="softBlur" x="79" y="79" width="357" height="277" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#bgMain)"/>
    <rect x="16" y="16" width="480" height="608" rx="32" stroke="#1d2433" stroke-opacity="0.75" stroke-width="3"/>
  </g>

  <!-- верхняя красная ткань -->
  <path d="M18 50C80 18 142 26 199 46C250 64 303 72 362 57C414 44 456 28 500 35V12H12V76C14 66 16 57 18 50Z"
        fill="#ff4d55" fill-opacity="0.95"/>

  <!-- тёплая центральная зона -->
  <g filter="url(#softBlur)">
    <ellipse cx="258" cy="232" rx="142" ry="104" fill="url(#sandGlow)"/>
  </g>

  <!-- карта / дорожки -->
  <path d="M84 248C124 216 163 219 197 242C230 264 261 284 302 278C344 272 377 240 421 224"
        stroke="#fff1c9" stroke-opacity="0.45" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 12"/>
  <path d="M94 338C130 312 177 315 214 339C246 360 287 374 327 362C367 350 392 322 422 305"
        stroke="#fff1c9" stroke-opacity="0.38" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 12"/>

  <!-- декоративные кресты -->
  <path d="M82 366L106 390" stroke="#b85d30" stroke-opacity="0.46" stroke-width="8" stroke-linecap="round"/>
  <path d="M106 366L82 390" stroke="#b85d30" stroke-opacity="0.46" stroke-width="8" stroke-linecap="round"/>

  <!-- мини сокровища -->
  <path d="M382 301C389 296 398 297 404 304C410 311 410 321 403 328C395 336 384 334 378 327C372 320 374 307 382 301Z"
        fill="#a85b27" fill-opacity="0.46"/>
  <circle cx="414" cy="330" r="7" fill="#9c5425" fill-opacity="0.42"/>
  <circle cx="429" cy="318" r="5" fill="#9c5425" fill-opacity="0.35"/>

  <!-- фонарь -->
  <g opacity="0.82">
    <path d="M424 84L459 61L481 91L448 119L424 84Z" fill="#70543a"/>
    <path d="M433 86L456 72L471 93L448 107L433 86Z" fill="#ffe59d"/>
  </g>

  <!-- металлическая деталь сверху слева -->
  <g opacity="0.84">
    <circle cx="72" cy="116" r="15" fill="#7a4d2f"/>
    <path d="M94 66C130 67 160 86 177 112" stroke="#c7c8ce" stroke-width="18" stroke-linecap="round"/>
    <path d="M95 68C129 70 155 87 170 109" stroke="#f0f3f8" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- coin -->
  <g filter="url(#coinShadow)" transform="rotate(-17 255 210)">
    <path d="M173 216L193 149L264 126L329 156L340 224L296 280L223 280L173 216Z" fill="url(#coinOuter)"/>
    <path d="M191 215L207 163L261 145L309 167L317 220L285 259L230 259L191 215Z" fill="url(#coinInner)"/>
    <path d="M191 215L207 163L261 145L309 167L317 220L285 259L230 259L191 215Z"
          stroke="url(#coinStroke)" stroke-width="6" stroke-linejoin="round"/>

    <!-- символ coinflip -->
    <path d="M246 174C258 171 271 173 279 182C286 190 286 200 277 208L259 223L281 238"
          stroke="url(#symbol)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M227 190C240 184 252 184 261 190"
          stroke="url(#symbol)" stroke-width="8" stroke-linecap="round"/>
    <path d="M227 236C240 245 255 246 271 239"
          stroke="url(#symbol)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- нижний красный свет -->
  <ellipse cx="257" cy="488" rx="214" ry="88" fill="#ff424c" fill-opacity="0.66"/>
  <ellipse cx="257" cy="612" rx="244" ry="64" fill="#6a8dff" fill-opacity="0.46"/>

  <!-- текст -->
  <g>
    <text x="256" y="517"
          text-anchor="middle"
          fill="url(#textWhite)"
          font-family="Arial, Helvetica, sans-serif"
          font-size="86"
          font-weight="900">COIN</text>

    <text x="256" y="596"
          text-anchor="middle"
          fill="url(#textWhite)"
          font-family="Arial, Helvetica, sans-serif"
          font-size="86"
          font-weight="900">FLIP</text>
  </g>

  <g opacity="0.96">
    <path d="M170 621L188 602H324L342 621L324 639H188L170 621Z"
          fill="rgba(255,255,255,0.06)" stroke="#f1e5ff" stroke-opacity="0.55" stroke-width="2"/>
    <text x="256" y="628"
          text-anchor="middle"
          fill="#f4eef9"
          font-family="Arial, Helvetica, sans-serif"
          font-size="24"
          font-weight="700"
          letter-spacing="2.2">TRINITI MODE</text>
  </g>
</svg>