<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clipCoinCard">
      <rect x="12" y="12" width="488" height="616" rx="36"/>
    </clipPath>

    <linearGradient id="bgCoinDark" x1="40" y1="40" x2="472" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3D3A37"/>
      <stop offset="0.45" stop-color="#2E2B29"/>
      <stop offset="1" stop-color="#1F1D1C"/>
    </linearGradient>

    <radialGradient id="bgCoinGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(250 210) rotate(90) scale(220 220)">
      <stop offset="0" stop-color="#FFD65C" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FFD65C" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="coinEdgeOuter" x1="151" y1="120" x2="352" y2="326" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF09C"/>
      <stop offset="0.24" stop-color="#FFD94E"/>
      <stop offset="0.56" stop-color="#F7B400"/>
      <stop offset="1" stop-color="#D96B11"/>
    </linearGradient>

    <linearGradient id="coinFace" x1="176" y1="118" x2="332" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF173"/>
      <stop offset="0.34" stop-color="#FFD228"/>
      <stop offset="0.7" stop-color="#F7B500"/>
      <stop offset="1" stop-color="#E39400"/>
    </linearGradient>

    <linearGradient id="coinInnerRing" x1="187" y1="136" x2="318" y2="258" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD84C"/>
      <stop offset="1" stop-color="#E89B00"/>
    </linearGradient>

    <radialGradient id="coinShine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(212 148) rotate(49) scale(108 82)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.70"/>
      <stop offset="0.4" stop-color="#FFF3B7" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#FFF3B7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="coinGlowFront" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(255 206) rotate(90) scale(96 96)">
      <stop offset="0" stop-color="#FFE26F" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#FFE26F" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadowCardCoin" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#050607" flood-opacity="0.42"/>
    </filter>

    <filter id="coinShadowBig" x="90" y="78" width="340" height="336" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="18" flood-color="#000000" flood-opacity="0.36"/>
    </filter>

    <filter id="textShadowCoin" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="3.5" flood-color="#000000" flood-opacity="0.28"/>
    </filter>

    <linearGradient id="titleFillCoin" x1="256" y1="430" x2="256" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F1E8"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadowCardCoin)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#bgCoinDark)"/>
  </g>

  <g clip-path="url(#clipCoinCard)">
    <ellipse cx="250" cy="210" rx="220" ry="220" fill="url(#bgCoinGlow)"/>

    <!-- soft top shine -->
    <path d="M42 76C124 28 304 24 448 106" stroke="white" stroke-opacity="0.055" stroke-width="24" stroke-linecap="round"/>
    <path d="M94 52C196 18 312 28 414 80" stroke="white" stroke-opacity="0.035" stroke-width="14" stroke-linecap="round"/>

    <!-- coin -->
    <g filter="url(#coinShadowBig)">
      <!-- edge / body -->
      <g transform="translate(0 10)">
        <ellipse cx="262" cy="258" rx="102" ry="112" fill="url(#coinEdgeOuter)"/>
      </g>

      <!-- face -->
      <g transform="translate(0 -4)">
        <ellipse cx="240" cy="215" rx="104" ry="104" fill="url(#coinFace)"/>
        <ellipse cx="240" cy="215" rx="83" ry="83" fill="url(#coinInnerRing)"/>
        <ellipse cx="240" cy="215" rx="69" ry="69" fill="url(#coinFace)"/>
        <ellipse cx="240" cy="215" rx="104" ry="104" fill="url(#coinShine)"/>
        <ellipse cx="240" cy="215" rx="90" ry="90" stroke="#FFF1A7" stroke-opacity="0.55" stroke-width="4"/>
        <ellipse cx="240" cy="215" rx="72" ry="72" stroke="#F6AE11" stroke-opacity="0.55" stroke-width="3"/>
      </g>

      <!-- skull -->
      <g transform="translate(0 -2)">
        <path d="M228.5 174C205.9 174 191 190.7 191 211.8C191 225.1 197.6 236.1 208.2 242.4V254.6C208.2 260.5 212.8 264.5 218.7 264.5H237.1C243 264.5 247.6 260.5 247.6 254.6V251.1H252.4V254.6C252.4 260.5 257 264.5 262.9 264.5H281.3C287.2 264.5 291.8 260.5 291.8 254.6V242.4C302.4 236.1 309 225.1 309 211.8C309 190.7 294.1 174 271.5 174H228.5Z" fill="#E98914"/>
        <path d="M233 168C210.4 168 195.5 184.7 195.5 205.8C195.5 219.1 202.1 230.1 212.7 236.4V248.6C212.7 254.5 217.3 258.5 223.2 258.5H241.6C247.5 258.5 252.1 254.5 252.1 248.6V245.1H256.9V248.6C256.9 254.5 261.5 258.5 267.4 258.5H285.8C291.7 258.5 296.3 254.5 296.3 248.6V236.4C306.9 230.1 313.5 219.1 313.5 205.8C313.5 184.7 298.6 168 276 168H233Z" fill="#FFDA3B"/>
        <path d="M223 205C223 197.8 228.6 192 235.6 192C242.6 192 248.2 197.8 248.2 205C248.2 212.2 242.6 218 235.6 218C228.6 218 223 212.2 223 205Z" fill="#B86B12"/>
        <path d="M260.8 205C260.8 197.8 266.4 192 273.4 192C280.4 192 286 197.8 286 205C286 212.2 280.4 218 273.4 218C266.4 218 260.8 212.2 260.8 205Z" fill="#B86B12"/>
        <path d="M254.7 227.5L242.2 245.8C240.7 248.1 242.3 251.1 245 251.1H265C267.7 251.1 269.3 248.1 267.8 245.8L255.3 227.5C255.1 227.2 254.9 227.2 254.7 227.5Z" fill="#B86B12"/>
        <rect x="226" y="252" width="28" height="12" rx="5" fill="#D77E14"/>
        <rect x="258" y="252" width="28" height="12" rx="5" fill="#D77E14"/>
      </g>

      <!-- clover -->
      <g transform="translate(0 0)">
        <path d="M286.3 217.7C286.3 208.4 293.5 201.2 302.5 201.2C307.3 201.2 311.7 203.3 314.7 206.8C317.7 203.3 322.1 201.2 326.9 201.2C335.9 201.2 343.1 208.4 343.1 217.7C343.1 226.1 336.7 232.7 329 233.9C331.1 237.1 332.3 240.8 332.3 244.8C332.3 254.1 325.1 261.3 316.1 261.3C307.1 261.3 299.9 254.1 299.9 244.8C299.9 240.8 301.1 237.1 303.2 233.9C293.5 232.7 286.3 226.1 286.3 217.7Z" fill="#87D938"/>
        <path d="M317.4 233.7C313.9 247.8 304.7 261.3 292.6 270.2" stroke="#5FAE21" stroke-width="8" stroke-linecap="round"/>
        <path d="M302.2 214.8C302.2 211.7 304.6 209.2 307.7 209.2C310.8 209.2 313.2 211.7 313.2 214.8C313.2 217.9 310.8 220.4 307.7 220.4C304.6 220.4 302.2 217.9 302.2 214.8Z" fill="#BFF07D" fill-opacity="0.45"/>
      </g>

      <ellipse cx="240" cy="215" rx="96" ry="96" fill="url(#coinGlowFront)"/>
    </g>

    <!-- title -->
    <g filter="url(#textShadowCoin)">
      <text x="256" y="526"
            text-anchor="middle"
            fill="url(#titleFillCoin)"
            font-family="Arial, Helvetica, sans-serif"
            font-size="72"
            font-weight="900"
            letter-spacing="1">COINFLIP</text>
    </g>

    <g opacity="0.96">
      <path d="M160 564H352L372 584L352 604H160L140 584L160 564Z" fill="none" stroke="#F8F1D7" stroke-opacity="0.82" stroke-width="2.2"/>
      <text x="256" y="591"
            text-anchor="middle"
            fill="#FFF9E9"
            font-family="Arial, Helvetica, sans-serif"
            font-size="22"
            font-weight="700"
            letter-spacing="2.2">TRINITI MODE</text>
    </g>
  </g>

  <rect x="16" y="16" width="480" height="608" rx="32" stroke="#1C2430" stroke-width="3"/>
</svg>