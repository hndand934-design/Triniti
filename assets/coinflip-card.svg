<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clipCoin">
      <rect x="12" y="12" width="488" height="616" rx="36"/>
    </clipPath>

    <linearGradient id="coinBg" x1="48" y1="16" x2="460" y2="624" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF7A45"/>
      <stop offset="0.24" stop-color="#FFB12A"/>
      <stop offset="0.62" stop-color="#F07A17"/>
      <stop offset="1" stop-color="#8F79FF"/>
    </linearGradient>

    <radialGradient id="coinGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
