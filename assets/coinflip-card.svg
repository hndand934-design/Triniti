<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="85" y1="28" x2="430" y2="624" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFBE2E"/>
      <stop offset="0.30" stop-color="#FFA40A"/>
      <stop offset="0.72" stop-color="#D56900"/>
      <stop offset="1" stop-color="#8E3C00"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(274 154) rotate(90) scale(246 246)">
      <stop offset="0" stop-color="#FFF4BF" stop-opacity="0.95"/>
      <stop offset="0.36" stop-color="#FFD95D" stop-opacity="0.54"/>
      <stop offset="1" stop-color="#FFD95D" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="coinRim" x1="179" y1="121" x2="344" y2="314" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8D550B"/>
      <stop offset="0.46" stop-color="#F5D171"/>
      <stop offset="1" stop-color="#7A4307"/>
    </linearGradient>

    <linearGradient id="coinFace" x1="191" y1="126" x2="325" y2="271" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF1B2"/>
      <stop offset="0.55" stop-color="#F3CB64"/>
      <stop offset="1" stop-color="#C47D18"/>
    </linearGradient>

    <linearGradient id="coinInner" x1="207" y1="144" x2="304" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF6C8"/>
      <stop offset="1" stop-color="#DB971F"/>
    </linearGradient>

    <linearGradient id="shadowFade" x1="160" y1="264" x2="329" y2="351" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5E2400" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#5E2400" stop-opacity="0"/>
    </linearGradient>

    <filter id="coinDrop" x="111" y="86" width="303" height="309" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="-18" dy="26" stdDeviation="16" flood-color="#5A2400" flood-opacity="0.42"/>
    </filter>

    <filter id="soft" x="74" y="34" width="364" height="254" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16"/>
    </filter>

    <linearGradient id="textWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2F2F2"/>
    </linearGradient>
  </defs>

  <rect width="512" height="640" rx="38" fill="url(#bg)"/>

  <g filter="url(#soft)">
    <ellipse cx="278" cy="145" rx="132" ry="92" fill="url(#bgGlow)"/>
  </g>

  <path d="M96 108C155 83 218 74 284 79C344 84 395 98 427 120"
        stroke="#FFEAA8" stroke-opacity="0.78" stroke-width="13" stroke-linecap="round"/>

  <g filter="url(#coinDrop)" transform="rotate(-18 255 222)">
    <ellipse cx="255" cy="227" rx="90" ry="92" fill="url(#coinRim)"/>
    <ellipse cx="255" cy="218" rx="79" ry="79" fill="url(#coinFace)"/>
    <ellipse cx="255" cy="218" rx="57" ry="57" fill="url(#coinInner)"/>

    <ellipse cx="255" cy="218" rx="67" ry="67" stroke="#FFF0AE" stroke-opacity="0.76" stroke-width="3.2"/>
    <ellipse cx="255" cy="218" rx="47" ry="47" stroke="#A96510" stroke-opacity="0.22" stroke-width="2.4"/>

    <!-- внутренний знак монеты: без доллара -->
    <path d="M255 181C269 181 280 187 286 197"
          stroke="#955A0D" stroke-width="9.5" stroke-linecap="round"/>
    <path d="M255 181C241 181 229 188 223 200"
          stroke="#955A0D" stroke-width="9.5" stroke-linecap="round"/>
    <path d="M223 200C219 208 219 216 223 224"
          stroke="#955A0D" stroke-width="9.5" stroke-linecap="round"/>
    <path d="M286 197C292 206 292 218 286 228"
          stroke="#955A0D" stroke-width="9.5" stroke-linecap="round"/>
    <path d="M223 224C229 236 241 243 255 243"
          stroke="#955A0D" stroke-width="9.5" stroke-linecap="round"/>
    <path d="M286 228C280 238 269 243 255 243"
          stroke="#955A0D" stroke-width="9.5" stroke-linecap="round"/>
    <path d="M255 190L255 234"
          stroke="#955A0D" stroke-width="7.5" stroke-linecap="round" opacity="0.18"/>
  </g>

  <ellipse cx="238" cy="309" rx="104" ry="36" fill="url(#shadowFade)"/>

  <text x="44" y="546"
        fill="url(#textWhite)"
        font-family="Arial, Helvetica, sans-serif"
        font-size="66"
        font-weight="900"
        letter-spacing="0.5">COINFLIP</text>

  <text x="176" y="588"
        fill="#FFF1D0"
        fill-opacity="0.94"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20"
        font-weight="700"
        letter-spacing="3.2">TRINITI MODE</text>
</svg>