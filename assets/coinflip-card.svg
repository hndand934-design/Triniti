          fill="#FFFFFF"
          font-family="Arial, Helvetica, sans-serif"
          font-size="63"
          font-weight="900">COIN</text>

    <text x="256" y="564"
          text-anchor="middle"
          fill="#FFFFFF"
          font-family="Arial, Helvetica, sans-serif"
          font-size="63"
          font-weight="900">FLIP</text>

    <text x="256" y="592"
          text-anchor="middle"
          fill="#F4EEF9"
