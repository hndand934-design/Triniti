<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clipCard">
      <rect x="12" y="12" width="488" height="616" rx="36"/>
    </clipPath>

    <linearGradient id="bgMain" x1="44" y1="36" x2="470" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#131C34"/>
      <stop offset="0.5" stop-color="#10182B"/>
      <stop offset="1" stop-color="#0A1120"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(258 214) rotate(90) scale(190 190)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="goldFace" x1="132" y1="124" x2="294" y2="284" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF39F"/>
      <stop offset="0.25" stop-color="#FFD84B"/>
      <stop offset="0.62" stop-color="#F8B400"/>
      <stop offset="1" stop-color="#DD7A11"/>
    </linearGradient>

    <linearGradient id="goldInner" x1="152" y1="142" x2="274" y2="262" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF27B"/>
      <stop offset="0.35" stop-color="#FFD42E"/>
      <stop offset="0.72" stop-color="#F7B300"/>
      <stop offset="1" stop-color="#E39400"/>
    </linearGradient>

    <linearGradient id="silverFace" x1="220" y1="106" x2="384" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="0.28" stop-color="#DEE7F4"/>
      <stop offset="0.65" stop-color="#A7B7CF"/>
      <stop offset="1" stop-color="#73859E"/>
    </linearGradient>

    <linearGradient id="silverInner" x1="238" y1="124" x2="360" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFE"/>
      <stop offset="0.34" stop-color="#DCE6F3"/>
      <stop offset="0.72" stop-color="#A6B7D0"/>
      <stop offset="1" stop-color="#7D90A9"/>
    </linearGradient>

    <linearGradient id="coinEdge" x1="150" y1="150" x2="366" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF2AE"/>
      <stop offset="0.18" stop-color="#F3D992"/>
      <stop offset="0.34" stop-color="#C7B08C"/>
      <stop offset="0.48" stop-color="#B9B5B8"/>
      <stop offset="0.66" stop-color="#8FA1BA"/>
      <stop offset="0.86" stop-color="#D4B254"/>
      <stop offset="1" stop-color="#F7C52A"/>
    </linearGradient>

    <radialGradient id="goldShine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(180 148) rotate(45) scale(104 76)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.74"/>
      <stop offset="0.42" stop-color="#FFF2BA" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FFF2BA" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="silverShine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(308 140) rotate(45) scale(98 72)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.76"/>
      <stop offset="0.42" stop-color="#EDF5FF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#EDF5FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="cardShadow" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#050607" flood-opacity="0.45"/>
    </filter>

    <filter id="coinShadow" x="74" y="74" width="364" height="340" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="16" flood-color="#000000" flood-opacity="0.34"/>
    </filter>

    <filter id="textShadow" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#000000" flood-opacity="0.30"/>
    </filter>

    <linearGradient id="textFill" x1="256" y1="430" x2="256" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF3FF"/>
    </linearGradient>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#bgMain)"/>
  </g>

  <g clip-path="url(#clipCard)">
    <ellipse cx="258" cy="214" rx="190" ry="190" fill="url(#bgGlow)"/>

    <path d="M52 86C124 48 224 36 332 64" stroke="white" stroke-opacity="0.05" stroke-width="18" stroke-linecap="round"/>
    <path d="M212 56C304 40 390 66 454 112" stroke="white" stroke-opacity="0.04" stroke-width="14" stroke-linecap="round"/>

    <g filter="url(#coinShadow)">
      <!-- edge -->
      <g transform="translate(0 18)">
        <ellipse cx="266" cy="248" rx="110" ry="122" fill="url(#coinEdge)"/>
      </g>

      <!-- left face gold -->
      <path d="M165 156C192 129 233 114 270 114C286 114 301 117 314 123C298 143 290 171 290 204C290 236 297 263 311 284C300 289 287 292 273 292C234 292 189 277 160 249C144 234 136 218 136 202C136 185 146 171 165 156Z"
            fill="url(#goldFace)"/>
      <path d="M183 168C204 147 236 136 264 136C274 136 284 137 292 141C281 158 276 179 276 203C276 226 280 247 290 264C283 267 275 268 266 268C236 268 202 258 180 238C168 227 162 215 162 203C162 191 169 180 183 168Z"
            fill="url(#goldInner)"/>

      <!-- right face silver -->
      <path d="M347 150C370 168 382 184 382 202C382 219 372 236 354 252C327 276 284 292 246 292C230 292 215 289 202 283C218 263 226 235 226 202C226 170 219 144 204 123C215 118 228 114 243 114C281 114 321 128 347 150Z"
            fill="url(#silverFace)"/>
      <path d="M334 167C351 180 360 191 360 203C360 214 353 225 339 237C317 257 282 268 252 268C242 268 233 267 225 264C235 247 240 226 240 203C240 180 235 159 226 141C233 138 241 136 250 136C280 136 314 147 334 167Z"
            fill="url(#silverInner)"/>

      <!-- separating side -->
      <ellipse cx="258" cy="203" rx="33" ry="89" fill="url(#coinEdge)"/>

      <!-- outer ring lines -->
      <path d="M165 156C192 129 233 114 270 114C286 114 301 117 314 123" stroke="#FFF2AF" stroke-opacity="0.40" stroke-width="4" stroke-linecap="round"/>
      <path d="M347 150C370 168 382 184 382 202C382 219 372 236 354 252" stroke="#F9FCFF" stroke-opacity="0.40" stroke-width="4" stroke-linecap="round"/>

      <!-- clean shines -->
      <path d="M155 166C173 149 201 136 229 132" stroke="url(#goldShine)" stroke-width="22" stroke-linecap="round"/>
      <path d="M274 136C298 138 321 148 340 165" stroke="url(#silverShine)" stroke-width="20" stroke-linecap="round"/>
    </g>

    <g filter="url(#textShadow)">
      <text x="256" y="520"
            text-anchor="middle"
            fill="url(#textFill)"
            font-family="Arial, Helvetica, sans-serif"
            font-size="66"
            font-weight="900"
            letter-spacing="1">COIN FLIP</text>
    </g>

    <g opacity="0.98">
      <path d="M160 560H352L372 580L352 600H160L140 580L160 560Z" fill="none" stroke="#EEF3FF" stroke-opacity="0.82" stroke-width="2.2"/>
      <text x="256" y="587"
            text-anchor="middle"
            fill="#F7FBFF"
            font-family="Arial, Helvetica, sans-serif"
            font-size="22"
            font-weight="700"
            letter-spacing="2.2">TRINITI MODE</text>
    </g>
  </g>

  <rect x="16" y="16" width="480" height="608" rx="32" stroke="#1B2434" stroke-width="3"/>
</svg>