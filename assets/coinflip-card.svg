    <path d="M60 96C132 72 212 69 294 83C362 94 421 88 474 54" stroke="#FFF3B0" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round"/>
    <path d="M84 278C151 246 219 235 288 246C336 254 388 254 436 246" stroke="#FFF8D4" stroke-opacity="0.45" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10"/>

    <circle cx="91" cy="343" r="5" fill="#F08D52" fill-opacity="0.6"/>
    <rect x="400" y="72" width="18" height="18" transform="rotate(28 400 72)" fill="#FFD57F" fill-opacity="0.85"/>

    <g filter="url(#coinShadow)">
      <ellipse cx="260" cy="190" rx="68" ry="68" fill="url(#coinOuter)"/>
      <ellipse cx="260" cy="190" rx="49" ry="49" fill="url(#coinInner)"/>
      <path d="M259 158C246 158 237 165 237 176C237 187 243 192 256 195C267 198 271 201 271 209C271 217 265 223 255 223C247 223 239 220 233 215" stroke="#8A5520" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M261 151V231" stroke="#8A5520" stroke-width="8" stroke-linecap="round"/>
      <ellipse cx="243" cy="167" rx="19" ry="12" fill="#FFF6B8" fill-opacity="0.28"/>
