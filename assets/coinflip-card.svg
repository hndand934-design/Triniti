      <stop offset="0" stop-color="#FFF3A8"/>
      <stop offset="0.44" stop-color="#FFD55A" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFD55A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="coinOuter" x1="208" y1="124" x2="314" y2="248" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF2A2"/>
      <stop offset="0.5" stop-color="#F6C850"/>
      <stop offset="1" stop-color="#C9871C"/>
    </linearGradient>

    <linearGradient id="coinInner" x1="224" y1="140" x2="298" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE8A1"/>
      <stop offset="1" stop-color="#D99B2B"/>
    </linearGradient>

    <filter id="coinShadow" x="152" y="96" width="220" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#7A3508" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#coinBg)"/>

  <g clip-path="url(#clipCoin)">
