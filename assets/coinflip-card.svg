<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgMain" x1="58" y1="24" x2="448" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff4f53"/>
      <stop offset="0.26" stop-color="#ff5a38"/>
      <stop offset="0.58" stop-color="#ff8a37"/>
      <stop offset="1" stop-color="#5b7cff"/>
    </linearGradient>

    <radialGradient id="warmGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(262 222) rotate(90) scale(210 196)">
      <stop offset="0" stop-color="#fff0b8"/>
      <stop offset="0.50" stop-color="#ffc76a" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffbf62" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="coinOuter" x1="187" y1="129" x2="331" y2="278" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef5ff"/>
      <stop offset="0.52" stop-color="#cfd8e6"/>
      <stop offset="1" stop-color="#8c9aaf"/>
    </linearGradient>

    <linearGradient id="coinInner" x1="202" y1="146" x2="309" y2="247" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f9fcff"/>
      <stop offset="0.54" stop-color="#dce3ee"/>
      <stop offset="1" stop-color="#a8b4c6"/>
    </linearGradient>

    <linearGradient id="coinStroke" x1="208" y1="151" x2="302" y2="245" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d8e1ed"/>
      <stop offset="1" stop-color="#8f9fb5"/>
    </linearGradient>

    <linearGradient id="symbol" x1="225" y1="178" x2="286" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dfe7f2"/>
      <stop offset="1" stop-color="#aab7ca"/>
    </linearGradient>

    <linearGradient id="textWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>

    <filter id="cardShadow" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#09101c" flood-opacity="0.28"/>
    </filter>

    <filter id="coinShadow" x="146" y="111" width="220" height="225" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="-10" dy="18" stdDeviation="11" flood-color="#7b4300" flood-opacity="0.28"/>
    </filter>

    <filter id="softBlur" x="93" y="86" width="339" height="264" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="txtShadow" x="76" y="437" width="360" height="132" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#742700" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#bgMain)"/>
    <rect x="16" y="16" width="480" height="608" rx="32" stroke="#1c2434" stroke-opacity="0.8" stroke-width="3"/>
  </g>

  <!-- верхняя красная волна -->
  <path d="M12 18H500V72C446 49 395 47 348 59C297 72 245 71 190 51C136 31 78 26 12 48V18Z"
        fill="#ff575f" fill-opacity="0.82"/>

  <!-- теплый центр -->
  <g filter="url(#softBlur)">
    <ellipse cx="258" cy="225" rx="136" ry="100" fill="url(#warmGlow)"/>
  </g>

  <!-- штрихи/дорожки -->
  <path d="M92 332C126 307 168 308 201 329C229 347 264 359 301 352C338 344 367 322 405 295"
        stroke="#fff1ca" stroke-opacity="0.44" stroke-width="4.8" stroke-linecap="round" stroke-dasharray="11 11"/>

  <path d="M114 259C148 235 185 236 215 256"
        stroke="#fff1ca" stroke-opacity="0.32" stroke-width="4" stroke-linecap="round"/>

  <path d="M78 359L99 380" stroke="#b95e33" stroke-opacity="0.42" stroke-width="7" stroke-linecap="round"/>
  <path d="M99 359L78 380" stroke="#b95e33" stroke-opacity="0.42" stroke-width="7" stroke-linecap="round"/>

  <circle cx="404" cy="353" r="8" fill="#9f5a2b" fill-opacity="0.38"/>
  <circle cx="421" cy="365" r="5" fill="#9f5a2b" fill-opacity="0.30"/>

  <!-- фонарь -->
  <g opacity="0.84">
    <path d="M420 78L453 58L475 87L443 108L420 78Z" fill="#72543f"/>
    <path d="M429 79L451 66L465 87L444 100L429 79Z" fill="#ffe7a0"/>
  </g>

  <!-- дуга сверху -->
  <path d="M109 106C154 83 210 76 266 82"
        stroke="#fff0b8" stroke-opacity="0.62" stroke-width="10" stroke-linecap="round"/>

  <!-- coin -->
  <g filter="url(#coinShadow)" transform="rotate(-16 256 212)">
    <path d="M186 214L203 154L263 133L320 158L330 216L291 266L227 266L186 214Z" fill="url(#coinOuter)"/>
    <path d="M201 213L215 168L261 152L304 170L311 214L281 249L233 249L201 213Z" fill="url(#coinInner)"/>
    <path d="M201 213L215 168L261 152L304 170L311 214L281 249L233 249L201 213Z"
          stroke="url(#coinStroke)" stroke-width="5" stroke-linejoin="round"/>

    <path d="M250 183C260 180 271 183 277 190C282 196 282 203 275 209L262 221L278 232"
          stroke="url(#symbol)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M236 194C245 190 253 190 260 194"
          stroke="url(#symbol)" stroke-width="6.5" stroke-linecap="round"/>
    <path d="M237 230C246 236 257 236 268 231"
          stroke="url(#symbol)" stroke-width="6.5" stroke-linecap="round"/>
  </g>

  <!-- нижнее свечение -->
  <ellipse cx="256" cy="494" rx="176" ry="56" fill="#ff4d5b" fill-opacity="0.58"/>
  <ellipse cx="256" cy="616" rx="238" ry="44" fill="#6d8aff" fill-opacity="0.42"/>

  <!-- текст как у Dice -->
  <g filter="url(#txtShadow)">
    <text x="256" y="520"
          text-anchor="middle"
          fill="url(#textWhite)"
          font-family="Arial, Helvetica, sans-serif"
          font-size="72"
          font-weight="900"
          letter-spacing="0">COIN</text>

    <text x="256" y="592"
          text-anchor="middle"
          fill="url(#textWhite)"
          font-family="Arial, Helvetica, sans-serif"
          font-size="72"
          font-weight="900"
          letter-spacing="0">FLIP</text>
  </g>

  <text x="256" y="622"
        text-anchor="middle"
        fill="#f4eef9"
        fill-opacity="0.95"
        font-family="Arial, Helvetica, sans-serif"
        font-size="19"
        font-weight="700"
        letter-spacing="3.2">TRINITI MODE</text>
</svg>