<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clipRpsCardClean">
      <rect x="12" y="12" width="488" height="616" rx="36"/>
    </clipPath>

    <linearGradient id="rpsBgClean" x1="52" y1="18" x2="458" y2="624" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF175F"/>
      <stop offset="0.5" stop-color="#FF4C49"/>
      <stop offset="1" stop-color="#FFB33D"/>
    </linearGradient>

    <radialGradient id="rpsGlowTopClean" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(256 132) rotate(90) scale(176 210)">
      <stop offset="0" stop-color="#FFADB2" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#FFADB2" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="rpsCenterGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(256 366) rotate(90) scale(210 250)">
      <stop offset="0" stop-color="#FFD36D" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FFD36D" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="goldTopClean" x1="226" y1="44" x2="288" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF07C"/>
      <stop offset="0.45" stop-color="#FFC933"/>
      <stop offset="1" stop-color="#FF9800"/>
    </linearGradient>

    <linearGradient id="goldLine" x1="116" y1="220" x2="396" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD560" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFD560" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFD560" stop-opacity="0"/>
    </linearGradient>

    <filter id="cardShadowClean" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#44111E" flood-opacity="0.30"/>
    </filter>

    <filter id="softShadowClean" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#621D27" flood-opacity="0.22"/>
    </filter>

    <filter id="txtShadowClean" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="2.4" flood-color="#7B2127" flood-opacity="0.24"/>
    </filter>
  </defs>

  <g filter="url(#cardShadowClean)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#rpsBgClean)"/>
  </g>

  <g clip-path="url(#clipRpsCardClean)">
    <ellipse cx="256" cy="132" rx="180" ry="126" fill="url(#rpsGlowTopClean)"/>
    <ellipse cx="256" cy="366" rx="190" ry="160" fill="url(#rpsCenterGlow)"/>

    <g filter="url(#softShadowClean)">
      <path d="M229 123L206 79L233 90L256 52L279 90L306 79L283 123H229Z" fill="url(#goldTopClean)"/>
      <rect x="223" y="123" width="66" height="18" rx="9" fill="url(#goldTopClean)"/>
      <circle cx="256" cy="50" r="7" fill="#FFE36C"/>
    </g>

    <g opacity="0.8">
