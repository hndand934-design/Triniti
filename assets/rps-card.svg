      <rect x="140" y="224" width="232" height="2" rx="1" fill="url(#goldLine)"/>
    </g>

    <g filter="url(#txtShadowClean)">
      <text x="256" y="356"
            text-anchor="middle"
            fill="#FFFFFF"
            font-family="Arial, Helvetica, sans-serif"
            font-size="54"
            font-weight="900"
            letter-spacing="0.4">КАМЕНЬ</text>

      <text x="256" y="420"
            text-anchor="middle"
            fill="#FFFFFF"
            font-family="Arial, Helvetica, sans-serif"
            font-size="54"
            font-weight="900"
            letter-spacing="0.4">НОЖНИЦЫ</text>

      <text x="256" y="484"
            text-anchor="middle"
            fill="#FFFFFF"
            font-family="Arial, Helvetica, sans-serif"
            font-size="54"
            font-weight="900"
            letter-spacing="0.4">БУМАГА</text>
    </g>

    <text x="256" y="590"
          text-anchor="middle"
          fill="#F7F0FA"
          fill-opacity="0.96"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18"
          font-weight="700"
          letter-spacing="2.8">TRINITI MODE</text>
  </g>

  <rect x="16" y="16" width="480" height="608" rx="32" stroke="#7B2941" stroke-width="3"/>
