<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="8" y1="5" x2="57" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1D24"/>
      <stop offset="0.34" stop-color="#12151C"/>
      <stop offset="0.72" stop-color="#231116"/>
      <stop offset="1" stop-color="#441118"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="12" y1="42" x2="52" y2="16" gradientUnits="userSpaceOnUse">
