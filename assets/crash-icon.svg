      <stop offset="0.52" stop-color="#FF7C45"/>
      <stop offset="1" stop-color="#FFD66F"/>
    </linearGradient>

    <radialGradient id="topGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
