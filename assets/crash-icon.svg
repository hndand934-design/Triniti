    <path d="M30 45C27.6 47.2 26.7 50 27.1 52.4C29.4 51.1 31.5 51.1 33.4 52.2C35.2 50.6 36 48.1 35.6 45.3C35.2 42.8 33.7 40.8 31.6 39.7C31.6 41.8 31.1 43.5 30 45Z"
