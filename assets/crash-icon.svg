    <path d="M31.1 46.3C29.8 47.7 29.2 49.2 29.4 50.8C30.7 50.1 31.9 50.1 33 50.7C34 49.6 34.4 48 34.2 46.4C34 44.8 33.2 43.5 32.1 42.8C32.1 44 31.8 45.1 31.1 46.3Z"
          fill="#FFF0A9"/>

    <!-- fins -->
    <path d="M24.6 38.4C22.3 39.7 20.4 41.7 19.3 44.1C21.8 43.6 24.1 43.8 26.4 44.9V40.5L24.6 38.4Z"
