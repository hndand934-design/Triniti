      <stop offset="0" stop-color="#FFF0AF"/>
      <stop offset="0.45" stop-color="#FFB35A" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FF7A3D" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="rocketBody" x1="30" y1="18" x2="34" y2="46" gradientUnits="userSpaceOnUse">
