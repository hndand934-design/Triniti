  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#bg)"/>

  <ellipse cx="44" cy="16" rx="10" ry="8" fill="url(#topGlow)"/>

  <path d="M13 42C20 39 25 35 30 30C35 25 39 20 45 15"
