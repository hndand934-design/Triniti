<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clipPenaltyUltra">
      <rect x="12" y="12" width="488" height="616" rx="36"/>
    </clipPath>

    <linearGradient id="penaltyUltraBg" x1="48" y1="16" x2="468" y2="628" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2CC53A"/>
      <stop offset="0.34" stop-color="#168A21"/>
      <stop offset="0.72" stop-color="#0E5615"/>
      <stop offset="1" stop-color="#082E0D"/>
    </linearGradient>

    <radialGradient id="penaltyTopLux" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(256 128) rotate(90) scale(134 230)">
      <stop offset="0" stop-color="#D6FFD1" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#D6FFD1" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="penaltyCenterLux" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(256 232) rotate(90) scale(160 210)">
      <stop offset="0" stop-color="#A9FF9A" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#A9FF9A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="fieldHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(256 330) rotate(90) scale(180 240)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="luxLine" x1="90" y1="0" x2="422" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D4FFCB" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#D4FFCB" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#D4FFCB" stop-opacity="0"/>
    </linearGradient>

    <filter id="cardShadowUltra" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#051B08" flood-opacity="0.36"/>
    </filter>

    <filter id="ballShadowUltra" x="52" y="42" width="408" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="20" flood-color="#061109" flood-opacity="0.38"/>
    </filter>

    <filter id="ballInnerGlow" x="78" y="76" width="356" height="356" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <filter id="txtShadowUltra" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5" stdDeviation="3" flood-color="#123415" flood-opacity="0.28"/>
    </filter>

    <radialGradient id="ballBody" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(192 164) rotate(37) scale(196 196)">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#F2F5F3"/>
      <stop offset="0.78" stop-color="#DEE5E0"/>
      <stop offset="1" stop-color="#BCC7C1"/>
    </radialGradient>

    <radialGradient id="ballDepth" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(320 314) rotate(-135) scale(190 190)">
      <stop offset="0" stop-color="#738179" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#738179" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="panelDarkUltra" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#36423A"/>
      <stop offset="0.45" stop-color="#1B241E"/>
      <stop offset="1" stop-color="#090C0A"/>
    </linearGradient>

    <radialGradient id="panelGloss" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(243 175) rotate(90) scale(74 110)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="ballSpecUltra1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(188 154) rotate(90) scale(78 108)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="ballSpecUltra2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(290 187) rotate(90) scale(38 44)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="ballRimLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(210 116) rotate(90) scale(70 140)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g filter="url(#cardShadowUltra)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#penaltyUltraBg)"/>
  </g>

  <g clip-path="url(#clipPenaltyUltra)">
    <ellipse cx="256" cy="128" rx="194" ry="122" fill="url(#penaltyTopLux)"/>
    <ellipse cx="256" cy="232" rx="182" ry="130" fill="url(#penaltyCenterLux)"/>
    <ellipse cx="256" cy="332" rx="196" ry="146" fill="url(#fieldHalo)"/>

    <g opacity="0.72">
      <rect x="82" y="82" width="348" height="10" rx="5" fill="url(#luxLine)"/>
      <rect x="102" y="108" width="308" height="8" rx="4" fill="url(#luxLine)"/>
      <rect x="122" y="134" width="268" height="7" rx="3.5" fill="url(#luxLine)"/>
    </g>

    <g filter="url(#ballShadowUltra)">
      <circle cx="256" cy="224" r="128" fill="url(#ballBody)"/>
      <circle cx="256" cy="224" r="128" fill="url(#ballDepth)"/>
      <circle cx="256" cy="224" r="128" fill="url(#ballRimLight)" style="mix-blend-mode:screen"/>

      <!-- center pentagon -->
      <path d="M256 167L293 193.5L279.4 236H232.6L219 193.5L256 167Z" fill="url(#panelDarkUltra)"/>

      <!-- top -->
      <path d="M219 193.5L210.6 144.6L245 122H267L301.4 144.6L293 193.5L256 167L219 193.5Z" fill="url(#panelDarkUltra)"/>
      <!-- upper left -->
      <path d="M174.5 150.8L210.6 144.6L219 193.5L183 220.6L149.8 191.7L174.5 150.8Z" fill="url(#panelDarkUltra)"/>
      <!-- upper right -->
      <path d="M337.5 150.8L362.2 191.7L329 220.6L293 193.5L301.4 144.6L337.5 150.8Z" fill="url(#panelDarkUltra)"/>
      <!-- lower left -->
      <path d="M176.8 256.6L183 220.6L219 193.5L232.6 236L206.7 270L176.8 256.6Z" fill="url(#panelDarkUltra)"/>
      <!-- lower right -->
      <path d="M305.3 270L279.4 236L293 193.5L329 220.6L335.2 256.6L305.3 270Z" fill="url(#panelDarkUltra)"/>

      <!-- subtle seams -->
      <path d="M149.8 191.7L132 223L176.8 256.6" stroke="#A6B0AA" stroke-opacity="0.50" stroke-width="5.2" stroke-linecap="round"/>
      <path d="M362.2 191.7L380 223L335.2 256.6" stroke="#A6B0AA" stroke-opacity="0.50" stroke-width="5.2" stroke-linecap="round"/>
      <path d="M245 122L220 97" stroke="#A6B0AA" stroke-opacity="0.45" stroke-width="5.2" stroke-linecap="round"/>
      <path d="M267 122L292 97" stroke="#A6B0AA" stroke-opacity="0.45" stroke-width="5.2" stroke-linecap="round"/>

      <!-- panel gloss -->
      <path d="M256 167L293 193.5L279.4 236H232.6L219 193.5L256 167Z" fill="url(#panelGloss)" style="mix-blend-mode:screen"/>

      <!-- global highlights -->
      <circle cx="256" cy="224" r="128" fill="url(#ballSpecUltra1)" style="mix-blend-mode:screen"/>
      <circle cx="256" cy="224" r="128" fill="url(#ballSpecUltra2)" style="mix-blend-mode:screen"/>
    </g>

    <!-- soft under-ball glow -->
    <g filter="url(#ballInnerGlow)" opacity="0.18">
      <ellipse cx="256" cy="344" rx="104" ry="24" fill="#D2FFD0"/>
    </g>

    <g filter="url(#txtShadowUltra)">
      <text x="256" y="504"
            text-anchor="middle"
            fill="#FFFFFF"
            font-family="Arial, Helvetica, sans-serif"
            font-size="66"
            font-weight="900"
            letter-spacing="0.55">PENALTY</text>
    </g>

    <text x="256" y="573"
          text-anchor="middle"
          fill="#F5FFF5"
          fill-opacity="0.98"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18"
          font-weight="700"
          letter-spacing="2.8">TRINITI MODE</text>
  </g>

  <rect x="16" y="16" width="480" height="608" rx="32" stroke="#173F19" stroke-width="3"/>
</svg>