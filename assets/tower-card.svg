<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clipTowerPremium">
      <rect x="12" y="12" width="488" height="616" rx="36"/>
    </clipPath>

    <linearGradient id="towerPremBg" x1="44" y1="14" x2="468" y2="626" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111B"/>
      <stop offset="0.42" stop-color="#0A1825"/>
      <stop offset="0.72" stop-color="#1A1228"/>
      <stop offset="1" stop-color="#31162F"/>
    </linearGradient>

    <radialGradient id="towerPremTopGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(256 116) rotate(90) scale(138 240)">
      <stop offset="0" stop-color="#7AD9FF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#7AD9FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="towerPremMoon" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(392 110) rotate(90) scale(86 86)">
      <stop offset="0" stop-color="#D3E6FF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#D3E6FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="towerPremFireGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(256 212) rotate(90) scale(132 112)">
      <stop offset="0" stop-color="#FFD15B" stop-opacity="0.62"/>
      <stop offset="0.4" stop-color="#FF8B2D" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FF4D2A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="towerPremBottom" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(256 580) rotate(90) scale(190 320)">
      <stop offset="0" stop-color="#FF5D87" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FF5D87" stop-opacity="0"/>
    </radialGradient>

    <filter id="towerPremShadow" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#03060C" flood-opacity="0.46"/>
    </filter>

    <filter id="dragonPremShadow" x="44" y="28" width="424" height="352" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#02070D" flood-opacity="0.56"/>
    </filter>

    <filter id="firePremBlur" x="165" y="112" width="182" height="168" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <filter id="textPremShadow" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="3.5" flood-color="#130813" flood-opacity="0.34"/>
    </filter>

    <linearGradient id="wingPrem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8090A4"/>
      <stop offset="0.5" stop-color="#546174"/>
      <stop offset="1" stop-color="#2A3340"/>
    </linearGradient>

    <linearGradient id="dragonPrem" x1="256" y1="94" x2="256" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A7B5C5"/>
      <stop offset="0.38" stop-color="#7B8A9D"/>
      <stop offset="0.72" stop-color="#4E5B6C"/>
      <stop offset="1" stop-color="#313947"/>
    </linearGradient>

    <radialGradient id="dragonPremSpec" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(226 132) rotate(90) scale(64 74)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="wallPremTop" x1="256" y1="276" x2="256" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8A96A6"/>
      <stop offset="1" stop-color="#5B6675"/>
    </linearGradient>

    <linearGradient id="wallPremFront" x1="256" y1="320" x2="256" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D7988"/>
      <stop offset="1" stop-color="#495260"/>
    </linearGradient>

    <linearGradient id="titlePrem" x1="256" y1="446" x2="256" y2="616" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFEAF5"/>
    </linearGradient>
  </defs>

  <g filter="url(#towerPremShadow)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#towerPremBg)"/>
  </g>

  <g clip-path="url(#clipTowerPremium)">
    <ellipse cx="256" cy="116" rx="196" ry="122" fill="url(#towerPremTopGlow)"/>
    <ellipse cx="392" cy="110" rx="66" ry="66" fill="url(#towerPremMoon)"/>
    <circle cx="392" cy="110" r="28" fill="#BFD4EA" fill-opacity="0.12"/>

    <!-- stars -->
    <g fill="#D8E8FF" fill-opacity="0.8">
      <circle cx="90" cy="102" r="1.6"/>
      <circle cx="122" cy="86" r="1.1"/>
      <circle cx="156" cy="118" r="1.4"/>
      <circle cx="332" cy="72" r="1.3"/>
      <circle cx="358" cy="94" r="1.1"/>
      <circle cx="430" cy="150" r="1.5"/>
    </g>

    <!-- mountains -->
    <path d="M-24 234L62 178L134 234H-24Z" fill="#101C2A"/>
    <path d="M84 228L188 152L282 228H84Z" fill="#0D1B28"/>
    <path d="M248 232L350 158L438 232H248Z" fill="#11202D"/>
    <path d="M376 238L474 170L560 238H376Z" fill="#0D1823"/>

    <!-- dragon -->
    <g filter="url(#dragonPremShadow)">
      <!-- wings -->
      <path d="M154 206C110 180 92 136 110 92C151 112 198 148 218 210C199 214 173 214 154 206Z"
            fill="url(#wingPrem)"/>
      <path d="M358 206C402 180 420 136 402 92C361 112 314 148 294 210C313 214 339 214 358 206Z"
            fill="url(#wingPrem)"/>

      <!-- wing ribs -->
      <path d="M176 196L135 112" stroke="#8B9AAF" stroke-opacity="0.42" stroke-width="6" stroke-linecap="round"/>
      <path d="M336 196L377 112" stroke="#8B9AAF" stroke-opacity="0.42" stroke-width="6" stroke-linecap="round"/>

      <!-- horns -->
      <path d="M224 124L199 84L228 104Z" fill="#C2CDD8"/>
      <path d="M288 124L313 84L284 104Z" fill="#C2CDD8"/>

      <!-- ears / side spikes -->
      <path d="M204 156L184 142L198 170Z" fill="#9DAABC"/>
      <path d="M308 156L328 142L314 170Z" fill="#9DAABC"/>

      <!-- head -->
      <path d="M256 110
               C220 110 192 139 192 174
               C192 202 212 226 228 247
               C239 261 247 273 256 292
               C265 273 273 261 284 247
               C300 226 320 202 320 174
               C320 139 292 110 256 110Z"
            fill="url(#dragonPrem)"/>

      <!-- face highlight -->
      <path d="M256 110
               C229 110 208 130 202 157
               C210 144 228 126 252 122
               C264 120 278 121 292 127
               C282 116 270 110 256 110Z"
            fill="url(#dragonPremSpec)" style="mix-blend-mode:screen"/>

      <!-- snout -->
      <path d="M228 212L256 232L284 212L275 257L256 285L237 257L228 212Z" fill="#596678"/>

      <!-- cheeks -->
      <path d="M214 197L230 207L226 224L210 214Z" fill="#6A788B"/>
      <path d="M298 197L282 207L286 224L302 214Z" fill="#6A788B"/>

      <!-- brows -->
      <path d="M224 171L246 163" stroke="#46515F" stroke-width="5.5" stroke-linecap="round"/>
      <path d="M288 171L266 163" stroke="#46515F" stroke-width="5.5" stroke-linecap="round"/>

      <!-- eyes -->
      <path d="M228 182L245 174L241 191L225 194Z" fill="#E6EEF6"/>
      <path d="M284 182L267 174L271 191L287 194Z" fill="#E6EEF6"/>
      <circle cx="236.5" cy="184.5" r="2.6" fill="#0B1015"/>
      <circle cx="275.5" cy="184.5" r="2.6" fill="#0B1015"/>

      <!-- nose -->
      <ellipse cx="246" cy="231" rx="3.6" ry="5.6" fill="#313944"/>
      <ellipse cx="266" cy="231" rx="3.6" ry="5.6" fill="#313944"/>

      <!-- chin spikes -->
      <path d="M246 266L252 277L240 274Z" fill="#8B98A8"/>
      <path d="M266 266L260 277L272 274Z" fill="#8B98A8"/>

      <!-- crown spine -->
      <path d="M256 98L245 70L256 76L267 70L256 98Z" fill="#B8C4CF"/>
      <path d="M256 130L248 111L256 116L264 111L256 130Z" fill="#B8C4CF"/>
      <path d="M256 154L250 138L256 142L262 138L256 154Z" fill="#B8C4CF"/>
    </g>

    <!-- fire -->
    <g filter="url(#firePremBlur)">
      <ellipse cx="256" cy="198" rx="56" ry="34" fill="#FFB84D" fill-opacity="0.58"/>
    </g>
    <ellipse cx="256" cy="210" rx="84" ry="52" fill="url(#towerPremFireGlow)"/>

    <path d="M256 148
             C242 171 216 182 216 208
             C216 232 235 252 256 252
             C277 252 296 233 296 209
             C296 185 280 174 272 160
             C271 178 260 183 253 192
             C248 185 247 167 256 148Z"
          fill="#FF7A2E"/>
    <path d="M256 173
             C246 186 237 192 237 207
             C237 221 246 233 256 233
             C266 233 275 221 275 208
             C275 196 268 189 262 182
             C261 191 256 195 252 200
             C250 194 250 183 256 173Z"
          fill="#FFD65C"/>

    <!-- wall -->
    <rect x="60" y="282" width="392" height="56" rx="8" fill="url(#wallPremTop)"/>
    <rect x="44" y="322" width="424" height="82" rx="10" fill="url(#wallPremFront)"/>

    <!-- wall splits -->
    <g stroke="#45515E" stroke-width="3.1" stroke-opacity="0.6">
      <path d="M96 282V404"/>
      <path d="M152 282V404"/>
      <path d="M212 282V404"/>
      <path d="M274 282V404"/>
      <path d="M336 282V404"/>
      <path d="M398 282V404"/>
      <path d="M70 354H442"/>
    </g>

    <!-- cracks -->
    <path d="M114 296L106 310L119 326" stroke="#657385" stroke-width="3" stroke-linecap="round"/>
    <path d="M197 292L210 307L202 321" stroke="#657385" stroke-width="3" stroke-linecap="round"/>
    <path d="M312 294L302 309L316 323" stroke="#657385" stroke-width="3" stroke-linecap="round"/>
    <path d="M384 291L396 306L390 321" stroke="#657385" stroke-width="3" stroke-linecap="round"/>

    <!-- bottom accent -->
    <rect x="0" y="404" width="512" height="224" fill="url(#towerPremBottom)"/>

    <!-- titles -->
    <g filter="url(#textPremShadow)">
      <text x="256" y="504"
            text-anchor="middle"
            fill="url(#titlePrem)"
            font-family="Arial, Helvetica, sans-serif"
            font-size="58"
            font-weight="900"
            letter-spacing="0.8">DRAGON</text>

      <text x="256" y="566"
            text-anchor="middle"
            fill="url(#titlePrem)"
            font-family="Arial, Helvetica, sans-serif"
            font-size="58"
            font-weight="900"
            letter-spacing="0.8">TOWER</text>
    </g>

    <text x="256" y="603"
          text-anchor="middle"
          fill="#FFF0F7"
          fill-opacity="0.94"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18"
          font-weight="700"
          letter-spacing="2.8">TRINITI MODE</text>
  </g>

  <rect x="16" y="16" width="480" height="608" rx="32" stroke="#222A36" stroke-width="3"/>
</svg>