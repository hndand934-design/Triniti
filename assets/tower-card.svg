<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="towerClipCard">
      <rect x="12" y="12" width="488" height="616" rx="36"/>
    </clipPath>

    <linearGradient id="towerBgCard" x1="256" y1="12" x2="256" y2="628" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08131E"/>
      <stop offset="0.45" stop-color="#0A1824"/>
      <stop offset="0.76" stop-color="#131526"/>
      <stop offset="1" stop-color="#27172C"/>
    </linearGradient>

    <radialGradient id="towerMoonGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(390 110) rotate(90) scale(94 94)">
      <stop offset="0" stop-color="#D5E7FF" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#D5E7FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="towerBackLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(256 190) rotate(90) scale(120 180)">
      <stop offset="0" stop-color="#8FB7E8" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#8FB7E8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="dragonWingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#748296"/>
      <stop offset="0.45" stop-color="#4D5A6B"/>
      <stop offset="1" stop-color="#27313C"/>
    </linearGradient>

    <linearGradient id="dragonBodyGrad" x1="256" y1="104" x2="256" y2="312" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A5B3C3"/>
      <stop offset="0.4" stop-color="#788699"/>
      <stop offset="0.74" stop-color="#4F5A69"/>
      <stop offset="1" stop-color="#2E3642"/>
    </linearGradient>

    <radialGradient id="dragonSpecCard" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(223 145) rotate(90) scale(72 88)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="wallTopCard" x1="256" y1="286" x2="256" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8794A4"/>
      <stop offset="1" stop-color="#5C6877"/>
    </linearGradient>

    <linearGradient id="wallFrontCard" x1="256" y1="322" x2="256" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6C7887"/>
      <stop offset="1" stop-color="#48515E"/>
    </linearGradient>

    <linearGradient id="titleTowerGrad" x1="256" y1="454" x2="256" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8EBF6"/>
    </linearGradient>

    <filter id="shadowCard" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#04080D" flood-opacity="0.45"/>
    </filter>

    <filter id="dragonShadowCard" x="48" y="52" width="416" height="314" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#03070D" flood-opacity="0.55"/>
    </filter>

    <filter id="textShadowCard" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="3.5" flood-color="#120814" flood-opacity="0.34"/>
    </filter>
  </defs>

  <g filter="url(#shadowCard)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#towerBgCard)"/>
  </g>

  <g clip-path="url(#towerClipCard)">
    <!-- sky -->
    <ellipse cx="390" cy="110" rx="70" ry="70" fill="url(#towerMoonGlow)"/>
    <ellipse cx="256" cy="192" rx="168" ry="112" fill="url(#towerBackLight)"/>

    <!-- stars -->
    <g fill="#E8F2FF" fill-opacity="0.78">
      <circle cx="88" cy="100" r="1.5"/>
      <circle cx="118" cy="82" r="1.1"/>
      <circle cx="146" cy="120" r="1.2"/>
      <circle cx="326" cy="74" r="1.1"/>
      <circle cx="356" cy="94" r="1.25"/>
      <circle cx="430" cy="148" r="1.35"/>
    </g>

    <!-- mountains -->
    <path d="M-20 238L64 180L136 238H-20Z" fill="#101D2A"/>
    <path d="M90 230L190 158L282 230H90Z" fill="#0D1A26"/>
    <path d="M246 234L348 164L438 234H246Z" fill="#10202D"/>
    <path d="M376 240L472 172L560 240H376Z" fill="#0C1722"/>

    <!-- dragon -->
    <g filter="url(#dragonShadowCard)">
      <!-- left wing -->
      <path d="M172 214C128 194 98 156 106 112C146 124 194 156 222 218C207 221 188 221 172 214Z"
            fill="url(#dragonWingGrad)"/>
      <!-- right wing -->
      <path d="M340 214C384 194 414 156 406 112C366 124 318 156 290 218C305 221 324 221 340 214Z"
            fill="url(#dragonWingGrad)"/>

      <!-- wing bone lines -->
      <path d="M183 206L146 126" stroke="#8D9BAE" stroke-opacity="0.34" stroke-width="6" stroke-linecap="round"/>
      <path d="M329 206L366 126" stroke="#8D9BAE" stroke-opacity="0.34" stroke-width="6" stroke-linecap="round"/>

      <!-- neck -->
      <path d="M229 252C231 226 237 199 246 178C252 165 260 156 270 150C277 170 280 193 279 223C278 247 272 268 264 291L244 291C238 279 232 266 229 252Z"
            fill="#546171"/>

      <!-- head silhouette -->
      <path d="M256 112
               C229 112 207 129 199 154
               C194 169 195 189 202 204
               C208 217 217 227 229 237
               C237 244 244 252 252 266
               C255 271 257 276 256 282
               C262 274 267 266 271 258
               C278 246 284 238 292 231
               C305 220 315 206 319 190
               C325 164 318 139 301 124
               C289 116 274 112 256 112Z"
            fill="url(#dragonBodyGrad)"/>

      <!-- snout -->
      <path d="M230 206L256 221L282 206L274 246L256 272L238 246L230 206Z" fill="#5A6778"/>

      <!-- forehead highlight -->
      <path d="M256 112
               C232 112 213 128 206 150
               C219 136 236 127 256 126
               C272 125 286 130 297 139
               C288 121 273 112 256 112Z"
            fill="url(#dragonSpecCard)" style="mix-blend-mode:screen"/>

      <!-- horns -->
      <path d="M226 126L206 90L230 108Z" fill="#C6D0D9"/>
      <path d="M286 126L306 90L282 108Z" fill="#C6D0D9"/>

      <!-- jaw spikes -->
      <path d="M243 258L249 271L238 268Z" fill="#9CA8B8"/>
      <path d="M269 258L263 271L274 268Z" fill="#9CA8B8"/>

      <!-- eyes -->
      <path d="M230 176L246 169L242 185L227 188Z" fill="#E9F0F6"/>
      <path d="M282 176L266 169L270 185L285 188Z" fill="#E9F0F6"/>
      <circle cx="237" cy="178.8" r="2.5" fill="#0B1015"/>
      <circle cx="275" cy="178.8" r="2.5" fill="#0B1015"/>

      <!-- brows -->
      <path d="M226 166L246 160" stroke="#47515E" stroke-width="5.2" stroke-linecap="round"/>
      <path d="M286 166L266 160" stroke="#47515E" stroke-width="5.2" stroke-linecap="round"/>

      <!-- nostrils -->
      <ellipse cx="247" cy="223" rx="3.4" ry="5.2" fill="#313943"/>
      <ellipse cx="265" cy="223" rx="3.4" ry="5.2" fill="#313943"/>
    </g>

    <!-- wall -->
    <rect x="60" y="286" width="392" height="54" rx="8" fill="url(#wallTopCard)"/>
    <rect x="44" y="322" width="424" height="82" rx="10" fill="url(#wallFrontCard)"/>

    <!-- stone seams -->
    <g stroke="#475260" stroke-width="3" stroke-opacity="0.56">
      <path d="M96 286V404"/>
      <path d="M152 286V404"/>
      <path d="M212 286V404"/>
      <path d="M274 286V404"/>
      <path d="M336 286V404"/>
      <path d="M398 286V404"/>
      <path d="M70 354H442"/>
    </g>

    <!-- cracks -->
    <path d="M118 300L110 314L122 328" stroke="#657385" stroke-width="3" stroke-linecap="round"/>
    <path d="M202 294L214 309L206 323" stroke="#657385" stroke-width="3" stroke-linecap="round"/>
    <path d="M312 296L302 311L316 324" stroke="#657385" stroke-width="3" stroke-linecap="round"/>
    <path d="M388 294L399 309L392 323" stroke="#657385" stroke-width="3" stroke-linecap="round"/>

    <!-- bottom tint -->
    <rect x="0" y="414" width="512" height="214" fill="url(#titleTowerGrad)" opacity="0.08"/>

    <!-- title -->
    <g filter="url(#textShadowCard)">
      <text x="256" y="506"
            text-anchor="middle"
            fill="url(#titleTowerGrad)"
            font-family="Arial, Helvetica, sans-serif"
            font-size="58"
            font-weight="900"
            letter-spacing="0.8">DRAGON</text>

      <text x="256" y="568"
            text-anchor="middle"
            fill="url(#titleTowerGrad)"
            font-family="Arial, Helvetica, sans-serif"
            font-size="58"
            font-weight="900"
            letter-spacing="0.8">TOWER</text>
    </g>

    <text x="256" y="604"
          text-anchor="middle"
          fill="#F8EEF6"
          fill-opacity="0.95"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18"
          font-weight="700"
          letter-spacing="2.8">TRINITI MODE</text>
  </g>

  <rect x="16" y="16" width="480" height="608" rx="32" stroke="#1F2833" stroke-width="3"/>
</svg>