<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="towerCardClipPremiumClean">
      <rect x="12" y="12" width="488" height="616" rx="36"/>
    </clipPath>

    <linearGradient id="towerPremiumBgClean" x1="256" y1="12" x2="256" y2="628" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#081019"/>
      <stop offset="0.34" stop-color="#0D1520"/>
      <stop offset="0.7" stop-color="#171420"/>
      <stop offset="1" stop-color="#2A1630"/>
    </linearGradient>

    <radialGradient id="towerPremiumAuraClean" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(256 236) rotate(90) scale(170 160)">
      <stop offset="0" stop-color="#BB8FFF" stop-opacity="0.16"/>
      <stop offset="0.46" stop-color="#7B9EFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#7B9EFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="stoneFrontPremiumClean" x1="256" y1="164" x2="256" y2="404" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#909CAC"/>
      <stop offset="0.3" stop-color="#768293"/>
      <stop offset="0.72" stop-color="#576170"/>
      <stop offset="1" stop-color="#3F4653"/>
    </linearGradient>

    <linearGradient id="stoneLeftPremiumClean" x1="168" y1="254" x2="218" y2="254" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#303743"/>
      <stop offset="1" stop-color="#596373"/>
    </linearGradient>

    <linearGradient id="stoneRightPremiumClean" x1="294" y1="254" x2="344" y2="254" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5A6474"/>
      <stop offset="1" stop-color="#313844"/>
    </linearGradient>

    <linearGradient id="roofPremiumClean" x1="256" y1="128" x2="256" y2="212" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#313846"/>
      <stop offset="1" stop-color="#161B23"/>
    </linearGradient>

    <linearGradient id="goldAccentPremiumClean" x1="256" y1="128" x2="256" y2="206" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE6A2"/>
      <stop offset="0.52" stop-color="#FFC86A"/>
      <stop offset="1" stop-color="#FF9E53"/>
    </linearGradient>

    <linearGradient id="windowPremiumClean" x1="256" y1="210" x2="256" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD97A"/>
      <stop offset="0.58" stop-color="#FFB95D"/>
      <stop offset="1" stop-color="#FF8F52"/>
    </linearGradient>

    <linearGradient id="titlePremiumClean" x1="256" y1="482" x2="256" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2E7F4"/>
    </linearGradient>

    <filter id="towerPremiumCardShadowClean" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#02060B" flood-opacity="0.44"/>
    </filter>

    <filter id="towerPremiumBodyShadowClean" x="124" y="106" width="264" height="344" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#000000" flood-opacity="0.34"/>
    </filter>

    <filter id="towerPremiumWindowGlowClean" x="186" y="192" width="140" height="196" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#FFB261" flood-opacity="0.26"/>
    </filter>

    <filter id="towerPremiumTextShadowClean" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#140915" flood-opacity="0.34"/>
    </filter>
  </defs>

  <g filter="url(#towerPremiumCardShadowClean)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#towerPremiumBgClean)"/>
  </g>

  <g clip-path="url(#towerCardClipPremiumClean)">
    <ellipse cx="256" cy="236" rx="170" ry="156" fill="url(#towerPremiumAuraClean)"/>

    <g fill="#EAF3FF" fill-opacity="0.72">
      <circle cx="82" cy="90" r="1.3"/>
      <circle cx="108" cy="120" r="1.1"/>
      <circle cx="148" cy="84" r="1.2"/>
      <circle cx="320" cy="80" r="1.15"/>
      <circle cx="426" cy="150" r="1.35"/>
    </g>

    <path d="M-20 290L74 216L158 290H-20Z" fill="#0C1822"/>
    <path d="M112 282L214 204L308 282H112Z" fill="#0A141C"/>
    <path d="M274 290L394 206L506 290H274Z" fill="#0C1620"/>

    <!-- TOWER -->
    <g filter="url(#towerPremiumBodyShadowClean)">
      <!-- side towers -->
      <path d="M180 226L200 201H218V414H168V242L180 226Z" fill="url(#stoneLeftPremiumClean)"/>
      <path d="M332 226L344 242V414H294V201H312L332 226Z" fill="url(#stoneRightPremiumClean)"/>

      <!-- main tower -->
      <rect x="218" y="176" width="76" height="238" rx="12" fill="url(#stoneFrontPremiumClean)"/>

      <!-- central roof -->
      <path d="M256 128L316 176H196L256 128Z" fill="url(#roofPremiumClean)"/>
      <path d="M256 141L296 176H216L256 141Z" fill="#414A58"/>

      <!-- crown -->
      <rect x="204" y="167" width="104" height="16" rx="6" fill="#8994A4"/>
      <path d="M204 167H218V154L226 167H242V152L256 167H270V152L284 167H300V154L308 167V183H204V167Z" fill="#98A4B3"/>

      <!-- gold top -->
      <path d="M256 116L266 150H246L256 116Z" fill="url(#goldAccentPremiumClean)"/>
      <circle cx="256" cy="112" r="6" fill="#FFD77C"/>
      <circle cx="256" cy="112" r="3" fill="#FFF2C8"/>

      <!-- top ornaments -->
      <path d="M218 169L226 145L233 169H218Z" fill="#262D37"/>
      <path d="M279 169L286 145L294 169H279Z" fill="#262D37"/>

      <!-- segment bands -->
      <rect x="218" y="216" width="76" height="9" rx="4.5" fill="#5F6977"/>
      <rect x="218" y="270" width="76" height="9" rx="4.5" fill="#5F6977"/>
      <rect x="218" y="324" width="76" height="9" rx="4.5" fill="#5F6977"/>

      <!-- brick details -->
      <g stroke="#4D5663" stroke-width="3" stroke-opacity="0.58">
        <path d="M218 244H294"/>
        <path d="M218 298H294"/>
        <path d="M218 352H294"/>
        <path d="M180 258H218"/>
        <path d="M180 312H218"/>
        <path d="M294 258H332"/>
        <path d="M294 312H332"/>
      </g>
    </g>

    <!-- glowing windows -->
    <g filter="url(#towerPremiumWindowGlowClean)">
      <rect x="236" y="200" width="40" height="40" rx="11" fill="url(#windowPremiumClean)"/>
      <rect x="236" y="254" width="40" height="40" rx="11" fill="url(#windowPremiumClean)"/>
      <rect x="236" y="308" width="40" height="40" rx="11" fill="url(#windowPremiumClean)"/>
    </g>

    <!-- gate -->
    <path d="M228 414C228 385 240 370 256 370C272 370 284 385 284 414H228Z" fill="#262C35"/>
    <path d="M239 414C239 392 247 380 256 380C265 380 273 392 273 414H239Z" fill="#11161D"/>

    <!-- platform -->
    <rect x="64" y="426" width="384" height="16" rx="8" fill="#6B7685"/>
    <rect x="48" y="442" width="416" height="24" rx="10" fill="#4B5460"/>

    <g stroke="#495360" stroke-width="3" stroke-opacity="0.58">
      <path d="M96 426V466"/>
      <path d="M150 426V466"/>
      <path d="M206 426V466"/>
      <path d="M270 426V466"/>
      <path d="M334 426V466"/>
      <path d="M388 426V466"/>
    </g>

    <!-- title -->
    <g filter="url(#towerPremiumTextShadowClean)">
      <text x="256" y="520"
            text-anchor="middle"
            fill="url(#titlePremiumClean)"
            font-family="Arial, Helvetica, sans-serif"
            font-size="54"
            font-weight="900"
            letter-spacing="0.8">DRAGON</text>

      <text x="256" y="578"
            text-anchor="middle"
            fill="url(#titlePremiumClean)"
            font-family="Arial, Helvetica, sans-serif"
            font-size="54"
            font-weight="900"
            letter-spacing="0.8">TOWER</text>
    </g>

    <text x="256" y="607"
          text-anchor="middle"
          fill="#F8EEF6"
          fill-opacity="0.96"
          font-family="Arial, Helvetica, sans-serif"
          font-size="17"
          font-weight="700"
          letter-spacing="2.5">TRINITI MODE</text>
  </g>

  <rect x="16" y="16" width="480" height="608" rx="32" stroke="#1F2833" stroke-width="3"/>
</svg>