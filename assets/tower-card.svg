<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clipCard">
      <rect x="12" y="12" width="488" height="616" rx="36"/>
    </clipPath>

    <linearGradient id="bgMain" x1="256" y1="12" x2="256" y2="628" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#091119"/>
      <stop offset="0.42" stop-color="#0E1721"/>
      <stop offset="0.75" stop-color="#1B1522"/>
      <stop offset="1" stop-color="#2D162C"/>
    </linearGradient>

    <radialGradient id="moonGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(384 112) rotate(90) scale(82 82)">
      <stop offset="0" stop-color="#DFE9FF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#DFE9FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="dragonAura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(258 224) rotate(90) scale(165 165)">
      <stop offset="0" stop-color="#B7C8DA" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#B7C8DA" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="wallTop" x1="256" y1="326" x2="256" y2="366" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B98A7"/>
      <stop offset="1" stop-color="#6B7684"/>
    </linearGradient>

    <linearGradient id="wallFront" x1="256" y1="358" x2="256" y2="436" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67717F"/>
      <stop offset="1" stop-color="#4A535F"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="256" y1="470" x2="256" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3E9F4"/>
    </linearGradient>

    <filter id="cardShadow" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#03070B" flood-opacity="0.42"/>
    </filter>

    <filter id="dragonShadow" x="70" y="70" width="372" height="360" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000000" flood-opacity="0.46"/>
    </filter>

    <filter id="textShadow" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#140915" flood-opacity="0.34"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#bgMain)"/>
  </g>

  <g clip-path="url(#clipCard)">
    <!-- background -->
    <ellipse cx="384" cy="112" rx="68" ry="68" fill="url(#moonGlow)"/>
    <ellipse cx="258" cy="224" rx="170" ry="150" fill="url(#dragonAura)"/>

    <!-- stars -->
    <g fill="#EAF3FF" fill-opacity="0.75">
      <circle cx="84" cy="92" r="1.3"/>
      <circle cx="110" cy="118" r="1.1"/>
      <circle cx="146" cy="86" r="1.2"/>
      <circle cx="324" cy="82" r="1.15"/>
      <circle cx="426" cy="150" r="1.35"/>
    </g>

    <!-- mountains -->
    <path d="M-16 266L74 192L156 266H-16Z" fill="#0D1822"/>
    <path d="M110 260L214 182L306 260H110Z" fill="#0A141D"/>
    <path d="M274 266L390 184L504 266H274Z" fill="#0C1620"/>

    <!-- PREMIUM SIMPLE DRAGON -->
    <g filter="url(#dragonShadow)">
      <!-- outer dragon -->
      <path d="M276 110
               C245 113 218 127 198 152
               C182 173 174 197 175 220
               C176 242 184 260 198 276
               C209 289 223 299 239 306
               C221 315 206 329 194 347
               C181 368 176 392 180 419
               C190 401 204 387 223 377
               C221 398 227 416 241 432
               C256 448 278 461 306 468
               C289 451 280 431 278 409
               C276 388 282 370 295 355
               C305 343 320 333 341 324
               C361 315 377 303 389 287
               C401 271 407 251 406 227
               C405 203 397 183 383 167
               C370 152 352 141 332 136
               C345 128 356 116 366 101
               C378 83 384 66 385 49
               C369 59 353 65 336 66
               C344 54 349 39 350 23
               C337 36 321 46 302 53
               C306 39 307 26 305 12
               C296 31 286 49 276 110Z"
            fill="#050607"/>

      <!-- head cut -->
      <path d="M226 160
               C235 145 248 132 266 124
               C283 116 299 113 315 115
               C302 124 292 136 286 151
               C298 149 310 151 321 156
               C307 160 295 167 286 177
               C298 177 309 181 318 189
               C303 189 290 194 278 202
               C264 211 250 214 235 212
               C228 199 225 182 226 160Z"
            fill="#12161B"/>

      <!-- jaw -->
      <path d="M219 171
               C204 174 191 182 180 194
               C170 205 159 211 147 215
               C159 219 172 219 186 216
               C176 228 169 241 165 257
               C186 250 204 240 220 225
               C232 214 237 199 236 181L219 171Z"
            fill="#050607"/>

      <!-- horn set -->
      <path d="M245 121L260 78L256 124Z" fill="#050607"/>
      <path d="M272 101L302 54L286 106Z" fill="#050607"/>
      <path d="M296 101L338 72L307 114Z" fill="#050607"/>

      <!-- side spikes -->
      <path d="M334 170C357 168 377 174 395 188C378 188 365 193 355 203C347 190 340 179 334 170Z" fill="#050607"/>
      <path d="M349 213C372 217 389 230 401 252C386 247 372 247 360 252C358 238 354 225 349 213Z" fill="#050607"/>
      <path d="M343 264C361 278 372 298 374 324C362 313 348 307 332 306C337 293 341 279 343 264Z" fill="#050607"/>
      <path d="M316 323C328 345 331 368 324 392C317 379 307 369 295 362C301 349 308 336 316 323Z" fill="#050607"/>

      <!-- eye -->
      <path d="M245 151L271 143L260 162L239 164Z" fill="#EEF5FA"/>

      <!-- inner line cuts -->
      <path d="M300 222C284 233 274 248 271 267C268 286 272 303 284 319C265 310 254 297 251 280C248 261 256 244 274 228C282 221 291 216 300 213V222Z"
            fill="#12161B"/>
      <path d="M281 357C267 372 260 389 261 409C262 426 269 441 281 454C260 446 245 434 237 418C228 401 228 383 236 364C244 345 258 331 278 320C270 332 268 345 271 360L281 357Z"
            fill="#12161B"/>
    </g>

    <!-- wall -->
    <rect x="58" y="326" width="396" height="46" rx="8" fill="url(#wallTop)"/>
    <rect x="42" y="358" width="428" height="78" rx="10" fill="url(#wallFront)"/>

    <g stroke="#4A5563" stroke-width="3" stroke-opacity="0.58">
      <path d="M94 326V436"/>
      <path d="M150 326V436"/>
      <path d="M208 326V436"/>
      <path d="M270 326V436"/>
      <path d="M334 326V436"/>
      <path d="M396 326V436"/>
      <path d="M70 388H442"/>
    </g>

    <!-- title -->
    <g filter="url(#textShadow)">
      <text x="256" y="506"
            text-anchor="middle"
            fill="url(#titleGrad)"
            font-family="Arial, Helvetica, sans-serif"
            font-size="58"
            font-weight="900"
            letter-spacing="0.8">DRAGON</text>
      <text x="256" y="568"
            text-anchor="middle"
            fill="url(#titleGrad)"
            font-family="Arial, Helvetica, sans-serif"
            font-size="58"
            font-weight="900"
            letter-spacing="0.8">TOWER</text>
    </g>

    <text x="256" y="604"
          text-anchor="middle"
          fill="#F8EEF6"
          fill-opacity="0.96"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18"
          font-weight="700"
          letter-spacing="2.8">TRINITI MODE</text>
  </g>

  <rect x="16" y="16" width="480" height="608" rx="32" stroke="#1F2833" stroke-width="3"/>
</svg>