<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clipCard">
      <rect x="12" y="12" width="488" height="616" rx="36"/>
    </clipPath>

    <linearGradient id="bgCard" x1="256" y1="12" x2="256" y2="628" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#081018"/>
      <stop offset="0.42" stop-color="#0A121B"/>
      <stop offset="0.72" stop-color="#15131E"/>
      <stop offset="1" stop-color="#271523"/>
    </linearGradient>

    <radialGradient id="moonGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(382 112) rotate(90) scale(88 88)">
      <stop offset="0" stop-color="#D8E5F8" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#D8E5F8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="dragonAura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(255 202) rotate(90) scale(150 178)">
      <stop offset="0" stop-color="#A1B7D3" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#A1B7D3" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="mistGrad" x1="256" y1="350" x2="256" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6B7A8E" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#6B7A8E" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="wallTop" x1="256" y1="292" x2="256" y2="338" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8995A4"/>
      <stop offset="1" stop-color="#67717E"/>
    </linearGradient>

    <linearGradient id="wallFront" x1="256" y1="324" x2="256" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67717E"/>
      <stop offset="1" stop-color="#4B535F"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="256" y1="468" x2="256" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2E6F0"/>
    </linearGradient>

    <filter id="cardShadow" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#03060A" flood-opacity="0.42"/>
    </filter>

    <filter id="dragonShadow" x="58" y="44" width="396" height="372" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020408" flood-opacity="0.52"/>
    </filter>

    <filter id="textShadow" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#120813" flood-opacity="0.34"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#bgCard)"/>
  </g>

  <g clip-path="url(#clipCard)">
    <!-- sky -->
    <ellipse cx="382" cy="112" rx="70" ry="70" fill="url(#moonGlow)"/>
    <ellipse cx="255" cy="202" rx="170" ry="120" fill="url(#dragonAura)"/>

    <!-- stars -->
    <g fill="#EAF2FF" fill-opacity="0.8">
      <circle cx="82" cy="96" r="1.3"/>
      <circle cx="108" cy="120" r="1.1"/>
      <circle cx="144" cy="82" r="1.2"/>
      <circle cx="326" cy="78" r="1.2"/>
      <circle cx="420" cy="154" r="1.4"/>
    </g>

    <!-- mountains -->
    <path d="M-20 244L72 178L156 244H-20Z" fill="#0D1821"/>
    <path d="M112 240L214 166L302 240H112Z" fill="#0A141D"/>
    <path d="M276 246L390 168L500 246H276Z" fill="#0C1620"/>

    <!-- DRAGON -->
    <g filter="url(#dragonShadow)">
      <!-- rear wing -->
      <path d="M308 167C346 128 388 112 430 121C404 143 378 168 360 206C349 228 340 250 337 275C319 253 308 216 308 167Z"
            fill="#131A22"/>
      <path d="M308 167C346 128 388 112 430 121" stroke="#3E4752" stroke-opacity="0.22" stroke-width="5" stroke-linecap="round"/>

      <!-- dragon silhouette -->
      <path d="M204 286
               C185 272 168 254 157 233
               C144 208 144 181 155 157
               C165 136 183 117 206 101
               C229 85 253 76 279 74
               C302 72 324 77 344 88
               C324 92 308 99 294 110
               C320 110 343 116 364 130
               C350 131 338 137 327 146
               C351 154 370 168 383 186
               C355 181 333 183 317 195
               C329 201 337 211 340 225
               C319 215 298 210 277 212
               C258 214 241 220 226 232
               C250 239 268 251 279 268
               C289 283 291 302 284 324
               C276 349 258 372 235 393
               C216 410 196 423 170 435
               C182 414 192 395 197 377
               C173 391 149 397 123 396
               C145 382 165 362 180 341
               C192 324 200 306 204 286Z"
            fill="#050607"/>

      <!-- neck / head extension -->
      <path d="M214 173
               C202 160 196 145 198 130
               C201 110 214 93 236 82
               C255 73 275 71 295 77
               C282 83 271 92 263 103
               C279 105 293 111 303 121
               C285 122 272 128 264 139
               C277 141 288 148 297 158
               C281 156 266 159 251 167
               C240 173 227 175 214 173Z"
            fill="#050607"/>

      <!-- jaw -->
      <path d="M203 170
               C191 171 181 177 172 188
               C165 196 156 201 145 203
               C155 208 166 209 178 206
               C171 214 165 223 159 234
               C177 229 193 220 207 205
               C217 194 221 182 220 170
               L203 170Z"
            fill="#050607"/>

      <!-- horn set -->
      <path d="M234 92L248 48L244 96Z" fill="#050607"/>
      <path d="M257 82L284 36L271 88Z" fill="#050607"/>
      <path d="M279 82L320 50L291 94Z" fill="#050607"/>

      <!-- whisker -->
      <path d="M158 204C128 219 106 238 92 266C108 258 126 244 145 225C151 218 156 211 158 204Z"
            fill="#050607"/>

      <!-- chest break -->
      <path d="M245 215
               C256 214 266 216 275 220
               C260 223 249 230 241 242
               C234 253 230 266 229 281
               C220 265 219 250 224 235
               C228 225 235 218 245 215Z"
            fill="#13161A"/>

      <!-- inner body highlight -->
      <path d="M198 161
               C205 134 225 112 252 95
               C270 84 288 79 307 79
               C292 84 279 94 270 106
               C283 108 295 114 304 122
               C286 124 273 130 264 141
               C276 143 286 149 294 158
               C276 158 261 163 248 172
               C236 179 223 183 208 184
               C203 177 200 170 198 161Z"
            fill="#1F242B"/>

      <!-- eye -->
      <path d="M220 132L242 125L233 142L215 144Z" fill="#EEF4FA"/>
    </g>

    <!-- mist -->
    <ellipse cx="255" cy="364" rx="156" ry="52" fill="url(#mistGrad)"/>

    <!-- wall -->
    <rect x="58" y="292" width="396" height="50" rx="8" fill="url(#wallTop)"/>
    <rect x="42" y="324" width="428" height="82" rx="10" fill="url(#wallFront)"/>

    <g stroke="#4A5563" stroke-width="3" stroke-opacity="0.6">
      <path d="M94 292V406"/>
      <path d="M150 292V406"/>
      <path d="M208 292V406"/>
      <path d="M270 292V406"/>
      <path d="M334 292V406"/>
      <path d="M396 292V406"/>
      <path d="M70 356H442"/>
    </g>

    <path d="M120 302L112 316L122 328" stroke="#667282" stroke-width="3" stroke-linecap="round"/>
    <path d="M194 300L206 315L198 327" stroke="#667282" stroke-width="3" stroke-linecap="round"/>
    <path d="M316 300L304 316L320 329" stroke="#667282" stroke-width="3" stroke-linecap="round"/>
    <path d="M390 300L402 315L394 327" stroke="#667282" stroke-width="3" stroke-linecap="round"/>

    <!-- title -->
    <g filter="url(#textShadow)">
      <text x="256" y="506"
            text-anchor="middle"
            fill="url(#titleGrad)"
            font-family="Arial, Helvetica, sans-serif"
            font-size="58"
            font-weight="900"
            letter-spacing="0.8">DRAGON</text>

      <text x="256" y="568"
            text-anchor="middle"
            fill="url(#titleGrad)"
            font-family="Arial, Helvetica, sans-serif"
            font-size="58"
            font-weight="900"
            letter-spacing="0.8">TOWER</text>
    </g>

    <text x="256" y="604"
          text-anchor="middle"
          fill="#F8EEF6"
          fill-opacity="0.96"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18"
          font-weight="700"
          letter-spacing="2.8">TRINITI MODE</text>
  </g>

  <rect x="16" y="16" width="480" height="608" rx="32" stroke="#1E2731" stroke-width="3"/>
</svg>