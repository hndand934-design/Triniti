      <path d="M257 308C251 316 248 324 248 334C248 343 252 351 258 356C264 351 268 343 268 334C268 324 265 316 259 308L258 305L257 308Z"
            fill="url(#fireOuter)"/>
      <path d="M257.8 316C254.3 321 252.7 327 252.9 333.5C253 339 255 344 258 347.8C261 344 263 338.9 263.1 333.5C263.3 327 261.7 321 258.2 316L258 314.6L257.8 316Z"
