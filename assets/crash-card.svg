<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cardClip">
      <rect x="12" y="12" width="488" height="616" rx="36"/>
    </clipPath>

    <linearGradient id="cardBg" x1="54" y1="24" x2="454" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#191C23"/>
      <stop offset="0.30" stop-color="#12151C"/>
      <stop offset="0.68" stop-color="#1D1114"/>
      <stop offset="1" stop-color="#3D0F14"/>
    </linearGradient>

    <linearGradient id="redGlowLine" x1="86" y1="320" x2="420" y2="148" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF4A4A"/>
      <stop offset="0.5" stop-color="#FF6D47"/>
      <stop offset="1" stop-color="#FFD16B"/>
    </linearGradient>

    <radialGradient id="topGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(360 108) rotate(90) scale(120 160)">
      <stop offset="0" stop-color="#FFF0AF"/>
      <stop offset="0.38" stop-color="#FFB35A" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FF7A3D" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="redMist" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(202 262) rotate(90) scale(180 240)">
      <stop offset="0" stop-color="#FF493E" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FF493E" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="rocketBody" x1="248" y1="160" x2="300" y2="304" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFF"/>
      <stop offset="0.46" stop-color="#DFE7F1"/>
      <stop offset="1" stop-color="#A7B4C6"/>
    </linearGradient>

    <linearGradient id="rocketEdge" x1="226" y1="180" x2="289" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D0D9E5"/>
      <stop offset="1" stop-color="#7E8A9B"/>
    </linearGradient>

    <linearGradient id="rocketShade" x1="258" y1="172" x2="286" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D5DEE9"/>
      <stop offset="1" stop-color="#8B98A9"/>
    </linearGradient>

    <linearGradient id="finRed" x1="208" y1="270" x2="247" y2="328" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF6161"/>
      <stop offset="1" stop-color="#B62B2B"/>
    </linearGradient>

    <linearGradient id="fireGrad" x1="221" y1="345" x2="264" y2="286" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF403C"/>
      <stop offset="0.45" stop-color="#FF8E3F"/>
      <stop offset="1" stop-color="#FFE37D"/>
    </linearGradient>

    <linearGradient id="txtWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>

    <filter id="shadowCard" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#05070B" flood-opacity="0.34"/>
    </filter>

    <filter id="shadowRocket" x="156" y="108" width="204" height="284" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="-6" dy="14" stdDeviation="10" flood-color="#000000" flood-opacity="0.36"/>
    </filter>

    <filter id="blurGlow" x="218" y="0" width="260" height="248" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <g filter="url(#shadowCard)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#cardBg)"/>
  </g>

  <g clip-path="url(#cardClip)">
    <g filter="url(#blurGlow)">
      <ellipse cx="352" cy="96" rx="74" ry="60" fill="url(#topGlow)"/>
    </g>

    <ellipse cx="198" cy="268" rx="150" ry="112" fill="url(#redMist)"/>

    <path d="M20 122C104 83 185 75 258 96C325 115 384 113 500 56V12H12V128C14 126 17 124 20 122Z"
          fill="rgba(255,255,255,0.03)"/>

    <path d="M76 316C132 291 177 264 217 229C260 191 294 153 343 117C379 91 419 74 470 58"
          stroke="url(#redGlowLine)" stroke-opacity="0.95" stroke-width="16" stroke-linecap="round"/>

    <path d="M84 346C143 317 192 286 233 246C273 207 309 166 352 131"
          stroke="url(#redGlowLine)" stroke-opacity="0.28" stroke-width="7" stroke-linecap="round"/>

    <path d="M66 370C118 352 168 323 211 278C250 238 280 197 311 149C336 111 364 81 398 54"
          stroke="#FF7A4A" stroke-opacity="0.34" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8"/>

    <!-- РОВНАЯ РАКЕТА -->
    <g filter="url(#shadowRocket)" transform="rotate(-28 258 238)">
      <!-- flame -->
      <path d="M244 314C236 322 232 333 233 346C242 341 250 341 257 346C264 340 268 330 267 318C266 307 260 297 251 292C250 301 248 308 244 314Z"
            fill="url(#fireGrad)"/>
      <path d="M249 319C244 324 242 331 243 338C248 335 253 335 257 338C261 334 263 328 262 322C261 316 258 311 253 308C253 312 251 316 249 319Z"
            fill="#FFF0A9"/>

      <!-- side fins -->
      <path d="M228 274C215 281 204 293 198 307C211 304 223 305 236 311L236 286L228 274Z"
            fill="url(#finRed)"/>
      <path d="M283 286L283 311C296 305 308 304 321 307C315 293 304 281 291 274L283 286Z"
            fill="url(#finRed)"/>

      <!-- body -->
      <path d="M259 132C278 156 289 187 289 231V291C289 302 281 310 271 310H248C237 310 229 302 229 291V231C229 187 240 156 259 132Z"
            fill="url(#rocketBody)"/>

      <!-- nose highlight -->
      <path d="M259 132C268 146 274 162 277 180C271 169 264 160 254 153C249 149 244 146 239 144C245 139 252 135 259 132Z"
            fill="#FFFFFF" fill-opacity="0.55"/>

      <!-- center shade -->
      <path d="M259 138C273 160 281 191 281 231V291C281 297 276 302 270 302H258V138H259Z"
            fill="url(#rocketShade)" fill-opacity="0.72"/>

      <!-- body stroke -->
      <path d="M259 132C278 156 289 187 289 231V291C289 302 281 310 271 310H248C237 310 229 302 229 291V231C229 187 240 156 259 132Z"
            stroke="url(#rocketEdge)" stroke-width="2"/>

      <!-- window -->
      <ellipse cx="259" cy="198" rx="12" ry="17" fill="#C9D8EB"/>
      <ellipse cx="259" cy="198" rx="7" ry="11" fill="#EAF3FF"/>
      <ellipse cx="255" cy="192" rx="3.4" ry="5.2" fill="#FFFFFF" fill-opacity="0.48"/>

      <!-- bottom nozzle -->
      <path d="M247 302H271L266 318H252L247 302Z" fill="#9EABB9"/>
    </g>

    <circle cx="108" cy="138" r="2.2" fill="#FFFFFF" fill-opacity="0.35"/>
    <circle cx="146" cy="104" r="1.8" fill="#FFFFFF" fill-opacity="0.26"/>
    <circle cx="392" cy="188" r="2" fill="#FFFFFF" fill-opacity="0.22"/>
    <circle cx="420" cy="146" r="1.5" fill="#FFFFFF" fill-opacity="0.28"/>

    <text x="256" y="502"
          text-anchor="middle"
          fill="url(#txtWhite)"
          font-family="Arial, Helvetica, sans-serif"
          font-size="68"
          font-weight="900">CRASH</text>

    <text x="256" y="608"
          text-anchor="middle"
          fill="#F4EEF9"
          fill-opacity="0.96"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18"
          font-weight="700"
          letter-spacing="2.8">TRINITI MODE</text>
  </g>

  <rect x="16" y="16" width="480" height="608" rx="32" stroke="#1C2433" stroke-width="3"/>
</svg>