      <path d="M258 132C275.6 157 285.4 189.4 285.4 228.5V294C285.4 305.3 276.3 314.4 265 314.4H251C239.7 314.4 230.6 305.3 230.6 294V228.5C230.6 189.4 240.4 157 258 132Z"
            stroke="url(#rocketStroke)" stroke-width="2"/>

      <ellipse cx="258" cy="202" rx="12.3" ry="17.4" fill="#C8D7EA"/>
      <ellipse cx="258" cy="202" rx="7.4" ry="11.3" fill="#ECF5FF"/>

      <path d="M249.5 307.5H266.5L263.7 320H252.3L249.5 307.5Z" fill="#8E99A6"/>
