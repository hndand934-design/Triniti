    <circle cx="108" cy="138" r="2.2" fill="#FFFFFF" fill-opacity="0.35"/>
    <circle cx="146" cy="104" r="1.8" fill="#FFFFFF" fill-opacity="0.26"/>
    <circle cx="392" cy="188" r="2" fill="#FFFFFF" fill-opacity="0.22"/>
    <circle cx="420" cy="146" r="1.5" fill="#FFFFFF" fill-opacity="0.28"/>

    <text x="256" y="502"
          text-anchor="middle"
          fill="url(#txtWhite)"
          font-family="Arial, Helvetica, sans-serif"
          font-size="68"
          font-weight="900">CRASH</text>

    <text x="256" y="596"
          text-anchor="middle"
          fill="#F4EEF9"
          fill-opacity="0.96"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18"
          font-weight="700"
          letter-spacing="2.8">TRINITI MODE</text>
