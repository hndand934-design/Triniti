      <path d="M278.4 289.6L282.3 304.2C290.8 299 300 297.8 310.6 300.1C305.3 288.7 296.5 279 286 272L278.4 289.6Z"
            fill="url(#finRed)"/>

      <path d="M258 132C275.6 157 285.4 189.4 285.4 228.5V294C285.4 305.3 276.3 314.4 265 314.4H251C239.7 314.4 230.6 305.3 230.6 294V228.5C230.6 189.4 240.4 157 258 132Z"
            fill="url(#rocketBody)"/>
      <path d="M258 140C270.3 162.3 277.2 191.4 277.2 227.8V293.2C277.2 300 271.7 305.6 264.8 305.6H258V140Z"
