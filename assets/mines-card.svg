<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cardClip">
      <rect x="12" y="12" width="488" height="616" rx="36"/>
    </clipPath>

    <linearGradient id="cardBg" x1="60" y1="18" x2="454" y2="624" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1DFFB7"/>
      <stop offset="0.18" stop-color="#19D8D8"/>
      <stop offset="0.48" stop-color="#1179FF"/>
      <stop offset="1" stop-color="#0A3CA8"/>
    </linearGradient>

    <radialGradient id="mainGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(290 250) rotate(90) scale(180 180)">
      <stop offset="0" stop-color="#91FFF2"/>
      <stop offset="0.45" stop-color="#4CF4E3" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#4CF4E3" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bombGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(305 255) rotate(90) scale(110 110)">
      <stop offset="0" stop-color="#37EFFF"/>
      <stop offset="1" stop-color="#37EFFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="bombBody" x1="230" y1="179" x2="345" y2="344" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#123A8C"/>
      <stop offset="0.45" stop-color="#0A2B6C"/>
      <stop offset="1" stop-color="#081A44"/>
    </linearGradient>

    <linearGradient id="bombBody2" x1="174" y1="218" x2="255" y2="338" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15448D"/>
      <stop offset="0.5" stop-color="#0C2F6A"/>
      <stop offset="1" stop-color="#081D47"/>
    </linearGradient>

    <linearGradient id="metal" x1="294" y1="142" x2="338" y2="178" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#36455F"/>
      <stop offset="1" stop-color="#0E1828"/>
    </linearGradient>

    <linearGradient id="fuse" x1="330" y1="129" x2="346" y2="148" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C8CDD7"/>
      <stop offset="1" stop-color="#727E90"/>
    </linearGradient>

    <radialGradient id="shine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(288 222) rotate(90) scale(64 54)">
      <stop offset="0" stop-color="#4FD9FF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#4FD9FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="starGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(387 291) rotate(90) scale(32 32)">
      <stop offset="0" stop-color="#B7FFF6"/>
      <stop offset="1" stop-color="#B7FFF6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="txtWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>

    <filter id="shadowCard" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#07101E" flood-opacity="0.26"/>
    </filter>

    <filter id="shadowBombBig" x="180" y="120" width="216" height="262" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="-6" dy="18" stdDeviation="12" flood-color="#061022" flood-opacity="0.38"/>
    </filter>

    <filter id="shadowBombSmall" x="106" y="154" width="168" height="210" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="-5" dy="15" stdDeviation="10" flood-color="#061022" flood-opacity="0.30"/>
    </filter>

    <filter id="blurGlow" x="160" y="116" width="290" height="280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
