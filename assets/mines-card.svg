  <g filter="url(#shadowCard)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#cardBg)"/>
  </g>

  <g clip-path="url(#cardClip)">
    <path d="M12 12H500V84C458 67 413 59 362 62C306 66 257 81 205 94C148 108 88 108 12 86V12Z"
          fill="#25D8E8" fill-opacity="0.20"/>

    <g filter="url(#blurGlow)">
      <ellipse cx="292" cy="254" rx="104" ry="96" fill="url(#mainGlow)"/>
      <ellipse cx="300" cy="254" rx="80" ry="72" fill="url(#bombGlow)"/>
    </g>

    <g opacity="0.96">
      <path d="M390 268L398 282L414 285L402 296L404 312L390 304L376 312L378 296L366 285L382 282L390 268Z"
            fill="#B7FFF6"/>
      <ellipse cx="390" cy="291" rx="28" ry="28" fill="url(#starGlow)"/>
    </g>

    <g opacity="0.72">
      <path d="M132 265L138 275L149 277L141 285L143 296L132 290L121 296L123 285L115 277L126 275L132 265Z"
            fill="#98FFF0"/>
    </g>

    <circle cx="223" cy="178" r="2" fill="#D7FFFF" fill-opacity="0.7"/>
    <circle cx="248" cy="150" r="1.6" fill="#D7FFFF" fill-opacity="0.55"/>

    <g filter="url(#shadowBombSmall)">
      <ellipse cx="192" cy="279" rx="54" ry="54" fill="url(#bombBody2)"/>
      <path d="M175 230H206L217 245H186L175 230Z" fill="url(#metal)"/>
      <rect x="196" y="214" width="4" height="20" rx="2" transform="rotate(-46 196 214)" fill="url(#fuse)"/>
      <ellipse cx="179" cy="258" rx="18" ry="14" fill="#3ADFFF" fill-opacity="0.18"/>
      <path d="M192 227C218 241 235 267 235 297" stroke="#6EB9FF" stroke-opacity="0.14" stroke-width="2"/>
    </g>

    <g filter="url(#shadowBombBig)">
      <ellipse cx="294" cy="267" rx="74" ry="74" fill="url(#bombBody)"/>
      <path d="M270 192H313L327 213H284L270 192Z" fill="url(#metal)"/>
      <rect x="309" y="176" width="5" height="28" rx="2.5" transform="rotate(-45 309 176)" fill="url(#fuse)"/>
      <ellipse cx="285" cy="235" rx="22" ry="18" fill="url(#shine)"/>
      <path d="M286 200C321 220 344 256 344 300" stroke="#89C9FF" stroke-opacity="0.14" stroke-width="2.2"/>
      <path d="M255 230L323 302" stroke="#96C7FF" stroke-opacity="0.12" stroke-width="2"/>
      <path d="M323 230L255 302" stroke="#96C7FF" stroke-opacity="0.12" stroke-width="2"/>
    </g>

    <text x="256" y="508"
          text-anchor="middle"
          fill="url(#txtWhite)"
          font-family="Arial, Helvetica, sans-serif"
          font-size="68"
          font-weight="900">MINES</text>

    <text x="256" y="592"
          text-anchor="middle"
          fill="#F4EEF9"
          fill-opacity="0.95"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18"
          font-weight="700"
          letter-spacing="2.8">TRINITI MODE</text>
  </g>

  <rect x="16" y="16" width="480" height="608" rx="32" stroke="#18305A" stroke-width="3"/>
</svg>