<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="miniBg" x1="8" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2F79F8"/>
      <stop offset="0.52" stop-color="#183F98"/>
      <stop offset="1" stop-color="#0A173D"/>
    </linearGradient>

    <linearGradient id="frontBig" x1="4" y1="6" x2="40" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D5DEED"/>
    </linearGradient>
    <linearGradient id="topBig" x1="22" y1="0" x2="22" y2="22" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9EFF8"/>
    </linearGradient>
    <linearGradient id="sideBig" x1="28" y1="18" x2="48" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8D9AAF"/>
      <stop offset="1" stop-color="#516077"/>
    </linearGradient>

    <linearGradient id="frontSmall" x1="2" y1="2" x2="28" y2="38" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D9E1EE"/>
    </linearGradient>
    <linearGradient id="topSmall" x1="14" y1="0" x2="14" y2="14" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF0F8"/>
    </linearGradient>
    <linearGradient id="sideSmall" x1="18" y1="10" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#98A4B8"/>
      <stop offset="1" stop-color="#59677F"/>
    </linearGradient>

    <filter id="shadow1" x="8" y="18" width="78" height="80" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#081121" flood-opacity="0.38"/>
    </filter>

    <filter id="shadow2" x="40" y="18" width="42" height="44" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4.5" stdDeviation="4" flood-color="#081121" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#miniBg)"/>
  <rect x="4.5" y="4.5" width="55" height="55" rx="15.5" stroke="#20458D"/>

  <ellipse cx="31" cy="48" rx="15" ry="4.2" fill="#091224" fill-opacity="0.22"/>

  <!-- back -->
  <g transform="translate(41 20) rotate(9)" filter="url(#shadow2)">
    <polygon points="10,2 20,8 11,13 1,8" fill="url(#topSmall)"/>
    <polygon points="1,8 11,13 11,26 1,20" fill="url(#frontSmall)"/>
    <polygon points="11,13 20,8 20,21 11,26" fill="url(#sideSmall)"/>

    <circle cx="10.5" cy="8" r="1.3" fill="#111827"/>
    <circle cx="4" cy="15" r="1.5" fill="#111827"/>
    <circle cx="7.5" cy="23" r="1.5" fill="#111827"/>
    <circle cx="14.5" cy="15.5" r="1.5" fill="#111827"/>
    <circle cx="17.6" cy="21" r="1.5" fill="#111827"/>
  </g>

  <!-- front -->
  <g transform="translate(17 24) rotate(-12)" filter="url(#shadow1)">
    <polygon points="20,3 40,14 22,25 2,14" fill="url(#topBig)"/>
    <polygon points="2,14 22,25 22,50 2,39" fill="url(#frontBig)"/>
    <polygon points="22,25 40,14 40,39 22,50" fill="url(#sideBig)"/>

    <!-- top 4 -->
    <circle cx="11" cy="10.5" r="1.9" fill="#111827"/>
    <circle cx="19" cy="6.5" r="1.9" fill="#111827"/>
    <circle cx="21" cy="14" r="1.9" fill="#111827"/>
    <circle cx="29" cy="10" r="1.9" fill="#111827"/>

    <!-- front 1 -->
    <circle cx="11" cy="32.5" r="2.1" fill="#111827"/>

    <!-- side 4 -->
    <circle cx="27" cy="28.5" r="2.1" fill="#111827"/>
    <circle cx="33.5" cy="31.2" r="2.1" fill="#111827"/>
    <circle cx="26.5" cy="42" r="2.1" fill="#111827"/>
    <circle cx="33" cy="44.8" r="2.1" fill="#111827"/>
  </g>
</svg>