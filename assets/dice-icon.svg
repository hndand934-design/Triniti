<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgMini" x1="12" y1="10" x2="112" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4A90FF"/>
      <stop offset="0.42" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#102A7A"/>
    </linearGradient>

    <radialGradient id="miniGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(62 28) rotate(90) scale(26 38)">
      <stop stop-color="#CBE5FF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#CBE5FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="front" x1="28" y1="48" x2="62" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#CAD5E8"/>
    </linearGradient>

    <linearGradient id="top" x1="38" y1="34" x2="66" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E6EDF8"/>
    </linearGradient>

    <linearGradient id="side" x1="61" y1="50" x2="91" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9CAAC1"/>
      <stop offset="1" stop-color="#58667E"/>
    </linearGradient>

    <radialGradient id="shine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(64 50) rotate(35) scale(20 8)">
      <stop stop-color="white" stop-opacity="0.95"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="10" y="18" width="108" height="100" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#081325" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect x="6" y="6" width="116" height="116" rx="28" fill="url(#bgMini)"/>
  <rect x="6.75" y="6.75" width="114.5" height="114.5" rx="27.25" stroke="rgba(255,255,255,.16)" stroke-width="1.5"/>

  <ellipse cx="62" cy="28" rx="34" ry="22" fill="url(#miniGlow)"/>

  <g filter="url(#shadow)">
    <polygon points="52,34 80,50 54,66 26,49" fill="url(#top)"/>
    <polygon points="26,49 54,66 54,100 26,84" fill="url(#front)"/>
    <polygon points="54,66 80,50 80,84 54,100" fill="url(#side)"/>

    <ellipse cx="58" cy="50" rx="18" ry="7" fill="url(#shine)"/>

    <!-- top pips -->
    <circle cx="40" cy="47" r="2.9" fill="#111827"/>
    <circle cx="51" cy="40" r="2.9" fill="#111827"/>
    <circle cx="60" cy="52" r="2.9" fill="#111827"/>
    <circle cx="70" cy="45" r="2.9" fill="#111827"/>

    <!-- front pips -->
    <circle cx="36" cy="64" r="3.2" fill="#111827"/>
    <circle cx="44" cy="87" r="3.2" fill="#111827"/>

    <!-- side pips -->
    <circle cx="63" cy="76" r="3.2" fill="#111827"/>
    <circle cx="68" cy="82" r="3.2" fill="#111827"/>
    <circle cx="73" cy="88" r="3.2" fill="#111827"/>
  </g>

  <ellipse cx="54" cy="106" rx="28" ry="5" fill="#091224" fill-opacity="0.18"/>
</svg>