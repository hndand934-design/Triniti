  <g filter="url(#cardShadow)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#bgMain)"/>
  </g>

  <rect x="16" y="16" width="480" height="608" rx="32" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>

  <ellipse cx="262" cy="130" rx="220" ry="260" fill="url(#bgGlowTop)"/>

  <path d="M34 150C110 108 190 104 270 122C340 137 404 128 480 74V156C416 194 346 202 270 186C188 168 122 172 34 228V150Z" fill="url(#waveA)"/>
  <path d="M28 232C104 206 180 208 260 228C342 248 412 238 484 200V278C408 316 334 320 254 298C174 276 108 278 28 330V232Z" fill="url(#waveB)"/>

  <ellipse cx="228" cy="348" rx="126" ry="18" fill="#071120" fill-opacity="0.30" filter="url(#groundBlur)"/>

  <!-- gold loop behind -->
  <g opacity="0.92">
    <path d="M146 286C146 246 178 216 230 216C258 216 282 224 302 240C322 256 350 266 380 266C398 266 414 263 428 258"
