<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cubeFront1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FCFEFF"/>
      <stop offset="1" stop-color="#CBD5E6"/>
    </linearGradient>

    <linearGradient id="cubeTop1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E1E9F5"/>
    </linearGradient>

    <linearGradient id="cubeSide1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#97A4BC"/>
      <stop offset="1" stop-color="#57657E"/>
    </linearGradient>

    <linearGradient id="cubeFront2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FCFEFF"/>
      <stop offset="1" stop-color="#D2DBEB"/>
    </linearGradient>

    <linearGradient id="cubeTop2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E4EBF6"/>
    </linearGradient>

    <linearGradient id="cubeSide2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#9CA9BF"/>
      <stop offset="1" stop-color="#5C6981"/>
    </linearGradient>

    <radialGradient id="spec1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(125 52) rotate(36) scale(70 28)">
      <stop stop-color="white" stop-opacity="0.82"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="spec2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(88 39) rotate(35) scale(54 22)">
      <stop stop-color="white" stop-opacity="0.7"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadowBig" x="24" y="82" width="286" height="278" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#081121" flood-opacity="0.38"/>
    </filter>

    <filter id="shadowMid" x="208" y="74" width="220" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#081121" flood-opacity="0.32"/>
    </filter>

    <filter id="groundBlur" x="88" y="292" width="270" height="58" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <ellipse cx="222" cy="320" rx="112" ry="20" fill="#091224" fill-opacity="0.28" filter="url(#groundBlur)"/>

  <!-- back cube -->
  <g transform="translate(246 114) rotate(8)" filter="url(#shadowMid)">
    <polygon points="68,12 132,49 72,84 8,47" fill="url(#cubeTop2)"/>
    <polygon points="8,47 72,84 72,163 8,126" fill="url(#cubeFront2)"/>
    <polygon points="72,84 132,49 132,128 72,163" fill="url(#cubeSide2)"/>

    <path d="M16 52L72 87" stroke="#AEBBD0" stroke-opacity="0.35" stroke-width="2"/>
    <path d="M72 87L126 54" stroke="#8290AA" stroke-opacity="0.3" stroke-width="2"/>

    <ellipse cx="88" cy="39" rx="27" ry="10" fill="url(#spec2)"/>

    <!-- top = 1 -->
    <circle cx="71" cy="46" r="6.6" fill="#111827"/>

    <!-- front = 2 -->
    <circle cx="31" cy="87" r="7.1" fill="#111827"/>
    <circle cx="51" cy="134" r="7.1" fill="#111827"/>

    <!-- side = 4 -->
    <circle cx="93" cy="96" r="7" fill="#111827"/>
    <circle cx="111" cy="86" r="7" fill="#111827"/>
    <circle cx="98" cy="136" r="7" fill="#111827"/>
    <circle cx="116" cy="126" r="7" fill="#111827"/>
  </g>

  <!-- front cube -->
  <g transform="translate(88 132) rotate(-12)" filter="url(#shadowBig)">
    <polygon points="86,16 170,64 92,110 8,61" fill="url(#cubeTop1)"/>
    <polygon points="8,61 92,110 92,218 8,170" fill="url(#cubeFront1)"/>
    <polygon points="92,110 170,64 170,171 92,218" fill="url(#cubeSide1)"/>

    <path d="M17 67L92 113" stroke="#AEBCCF" stroke-opacity="0.38" stroke-width="2.2"/>
    <path d="M92 113L163 71" stroke="#8190AA" stroke-opacity="0.32" stroke-width="2.2"/>

    <ellipse cx="112" cy="50" rx="38" ry="14" fill="url(#spec1)"/>

    <!-- top = 4 -->
    <circle cx="50" cy="47" r="7.6" fill="#111827"/>
    <circle cx="84" cy="31" r="7.6" fill="#111827"/>
    <circle cx="90" cy="66" r="7.6" fill="#111827"/>
    <circle cx="124" cy="49" r="7.6" fill="#111827"/>

    <!-- front = 2 -->
    <circle cx="33" cy="112" r="8.2" fill="#111827"/>
    <circle cx="64" cy="186" r="8.2" fill="#111827"/>

    <!-- side = 3 -->
    <circle cx="121" cy="124" r="8.2" fill="#111827"/>
    <circle cx="139" cy="148" r="8.2" fill="#111827"/>
    <circle cx="156" cy="173" r="8.2" fill="#111827"/>
  </g>
</svg>