  <g filter="url(#cardShadow)">
    <rect x="16" y="16" width="480" height="608" rx="34" fill="url(#bgMain)"/>
  </g>

  <rect x="16.75" y="16.75" width="478.5" height="606.5" rx="33.25" stroke="rgba(255,255,255,.16)" stroke-width="1.5"/>

