<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgMain" x1="42" y1="28" x2="456" y2="618" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3F95FF"/>
      <stop offset="0.38" stop-color="#1F63E3"/>
      <stop offset="0.72" stop-color="#163A9C"/>
      <stop offset="1" stop-color="#0B173E"/>
    </linearGradient>

    <radialGradient id="bgGlowTop" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
