    <circle cx="67" cy="43" r="6.4" fill="#111827"/>
    <circle cx="25" cy="82" r="6.8" fill="#111827"/>
    <circle cx="47" cy="96" r="6.8" fill="#111827"/>
    <circle cx="24" cy="128" r="6.8" fill="#111827"/>
    <circle cx="47" cy="141" r="6.8" fill="#111827"/>
    <circle cx="96" cy="96" r="6.8" fill="#111827"/>
    <circle cx="110" cy="128" r="6.8" fill="#111827"/>
  </g>

