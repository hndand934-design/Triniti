    <circle cx="48" cy="45" r="7.5" fill="#111827"/>
    <circle cx="80" cy="29" r="7.5" fill="#111827"/>
    <circle cx="88" cy="61" r="7.5" fill="#111827"/>
    <circle cx="120" cy="46" r="7.5" fill="#111827"/>

    <!-- front = 2 -->
    <circle cx="32" cy="111" r="8.1" fill="#111827"/>
    <circle cx="62" cy="185" r="8.1" fill="#111827"/>

    <!-- side = 3 -->
    <circle cx="118" cy="121" r="8.1" fill="#111827"/>
    <circle cx="136" cy="145" r="8.1" fill="#111827"/>
    <circle cx="152" cy="171" r="8.1" fill="#111827"/>
