<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="diceFrontA" x1="34" y1="42" x2="178" y2="212" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDFEFF"/>
      <stop offset="1" stop-color="#CCD6E7"/>
    </linearGradient>

    <linearGradient id="diceTopA" x1="101" y1="0" x2="101" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E2E9F5"/>
    </linearGradient>

    <linearGradient id="diceSideA" x1="149" y1="77" x2="242" y2="212" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9AA8C0"/>
      <stop offset="1" stop-color="#596780"/>
    </linearGradient>

    <linearGradient id="diceFrontB" x1="12" y1="18" x2="98" y2="125" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDFEFF"/>
      <stop offset="1" stop-color="#CBD5E6"/>
    </linearGradient>

    <linearGradient id="diceTopB" x1="54" y1="0" x2="54" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DFE7F3"/>
    </linearGradient>

    <linearGradient id="diceSideB" x1="79" y1="42" x2="130" y2="122" gradientUnits="userSpaceOnUse">
      <stop stop-color="#96A5BE"/>
      <stop offset="1" stop-color="#56637B"/>
    </linearGradient>

    <radialGradient id="shineA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(143 92) rotate(54.5) scale(88 46)">
      <stop stop-color="white" stop-opacity="0.75"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="shineB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(60 34) rotate(50) scale(44 24)">
      <stop stop-color="white" stop-opacity="0.7"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadowBig" x="10" y="32" width="336" height="304" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#08101F" flood-opacity="0.38"/>
    </filter>

    <filter id="shadowSmall" x="190" y="52" width="170" height="180" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#08101F" flood-opacity="0.34"/>
    </filter>

    <filter id="groundBlur" x="78" y="270" width="260" height="72" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <ellipse cx="208" cy="306" rx="110" ry="22" fill="#091224" fill-opacity="0.36" filter="url(#groundBlur)"/>

  <!-- rear dice -->
  <g transform="translate(248 112) rotate(11)" filter="url(#shadowSmall)">
    <polygon points="58,10 108,38 61,66 10,37" fill="url(#diceTopB)"/>
    <polygon points="10,37 61,66 61,122 10,93" fill="url(#diceFrontB)"/>
    <polygon points="61,66 108,38 108,95 61,122" fill="url(#diceSideB)"/>

    <path d="M18 43L61 68" stroke="#AAB7CC" stroke-opacity="0.45" stroke-width="2"/>
    <path d="M61 68L100 44" stroke="#7F8EAA" stroke-opacity="0.35" stroke-width="2"/>

    <ellipse cx="60" cy="27" rx="23" ry="9" fill="url(#shineB)"/>

    <circle cx="36" cy="52" r="5.3" fill="#111827"/>
    <circle cx="35" cy="103" r="5.3" fill="#111827"/>

    <circle cx="83" cy="72" r="5.5" fill="#111827"/>
    <circle cx="95" cy="88" r="5.5" fill="#111827"/>
  </g>

  <!-- front dice -->
  <g transform="translate(88 134) rotate(-11)" filter="url(#shadowBig)">
    <polygon points="88,16 177,66 94,114 4,64" fill="url(#diceTopA)"/>
    <polygon points="4,64 94,114 94,226 4,176" fill="url(#diceFrontA)"/>
    <polygon points="94,114 177,66 177,178 94,226" fill="url(#diceSideA)"/>

    <path d="M14 72L94 118" stroke="#A9B5CA" stroke-opacity="0.42" stroke-width="2.2"/>
    <path d="M94 118L166 76" stroke="#7F8EA8" stroke-opacity="0.34" stroke-width="2.2"/>

    <ellipse cx="108" cy="48" rx="44" ry="16" fill="url(#shineA)"/>

    <!-- top = 4 -->
    <circle cx="52" cy="52" r="7.4" fill="#111827"/>
    <circle cx="89" cy="34" r="7.4" fill="#111827"/>
    <circle cx="94" cy="72" r="7.4" fill="#111827"/>
    <circle cx="132" cy="54" r="7.4" fill="#111827"/>

    <!-- front = 2 -->
    <circle cx="34" cy="112" r="8.1" fill="#111827"/>
    <circle cx="63" cy="188" r="8.1" fill="#111827"/>

    <!-- side = 3 -->
    <circle cx="124" cy="125" r="8.1" fill="#111827"/>
    <circle cx="143" cy="151" r="8.1" fill="#111827"/>
    <circle cx="160" cy="178" r="8.1" fill="#111827"/>
  </g>
</svg>