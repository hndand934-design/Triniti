    <polygon points="-8,40 48,72 48,142 -8,110" fill="url(#cubeFrontSmall)"/>
    <polygon points="48,72 100,42 100,112 48,142" fill="url(#cubeSideSmall)"/>

    <ellipse cx="54" cy="32" rx="28" ry="12" fill="url(#shineSmall)"/>

    <!-- top = 2 -->
    <circle cx="28" cy="35" r="5.8" fill="#111827"/>
    <circle cx="67" cy="50" r="5.8" fill="#111827"/>

    <!-- front = 1 -->
    <circle cx="20" cy="82" r="6.2" fill="#111827"/>

    <!-- side = 4 -->
    <circle cx="67" cy="82" r="6.2" fill="#111827"/>
    <circle cx="84" cy="73" r="6.2" fill="#111827"/>
    <circle cx="67" cy="118" r="6.2" fill="#111827"/>
    <circle cx="84" cy="108" r="6.2" fill="#111827"/>
  </g>

  <!-- front cube -->
  <g transform="translate(88 150) rotate(-12)" filter="url(#shadowBig)">
    <polygon points="74,12 166,64 82,112 -10,60" fill="url(#cubeTopBig)"/>
    <polygon points="-10,60 82,112 82,228 -10,176" fill="url(#cubeFrontBig)"/>
    <polygon points="82,112 166,64 166,180 82,228" fill="url(#cubeSideBig)"/>

    <ellipse cx="98" cy="42" rx="50" ry="20" fill="url(#shineBig)"/>

    <!-- top = 4 -->
    <circle cx="28" cy="50" r="7.6" fill="#111827"/>
    <circle cx="70" cy="32" r="7.6" fill="#111827"/>
    <circle cx="89" cy="64" r="7.6" fill="#111827"/>
    <circle cx="132" cy="45" r="7.6" fill="#111827"/>

    <!-- front = 2 -->
    <circle cx="18" cy="116" r="8.2" fill="#111827"/>
    <circle cx="48" cy="192" r="8.2" fill="#111827"/>

    <!-- side = 3 -->
    <circle cx="112" cy="130" r="8.2" fill="#111827"/>
    <circle cx="129" cy="156" r="8.2" fill="#111827"/>
    <circle cx="146" cy="184" r="8.2" fill="#111827"/>
