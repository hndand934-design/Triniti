<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip">
      <rect x="12" y="12" width="488" height="616" rx="36"/>
    </clipPath>

    <linearGradient id="bg" x1="42" y1="18" x2="460" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5FA0FF"/>
      <stop offset="0.2" stop-color="#3A76F0"/>
      <stop offset="0.62" stop-color="#163DAE"/>
      <stop offset="1" stop-color="#0A1E68"/>
    </linearGradient>

    <radialGradient id="shineTop" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(196 105) rotate(90) scale(90 210)">
      <stop offset="0" stop-color="#A8C9FF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#A8C9FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cubeWhite" x1="169" y1="171" x2="278" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDFEFF"/>
      <stop offset="0.5" stop-color="#E6EDF7"/>
      <stop offset="1" stop-color="#BCC8D8"/>
    </linearGradient>

    <linearGradient id="cubeSide" x1="250" y1="180" x2="332" y2="312" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DBE6F4"/>
      <stop offset="1" stop-color="#9FADC2"/>
    </linearGradient>

    <linearGradient id="cubeTop" x1="196" y1="126" x2="285" y2="207" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D9E5F4"/>
    </linearGradient>

    <filter id="shadow" x="122" y="120" width="258" height="252" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#07143B" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#bg)"/>
  <g clip-path="url(#clip)">
    <ellipse cx="196" cy="105" rx="170" ry="90" fill="url(#shineTop)"/>

    <path d="M28 94C99 65 176 57 264 74C331 86 395 84 484 34" stroke="#A4C4FF" stroke-opacity="0.18" stroke-width="12" stroke-linecap="round"/>
    <path d="M30 148C122 111 206 103 296 119C366 130 424 128 490 106" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="8" stroke-linecap="round"/>

    <g filter="url(#shadow)">
      <!-- left cube -->
      <path d="M177 171L243 184L243 260L177 247V171Z" fill="url(#cubeWhite)"/>
      <path d="M243 184L302 158V233L243 260V184Z" fill="url(#cubeSide)"/>
      <path d="M177 171L235 146L302 158L243 184L177 171Z" fill="url(#cubeTop)"/>

      <!-- right cube -->
      <path d="M276 191L322 200L322 253L276 244V191Z" fill="url(#cubeWhite)"/>
      <path d="M322 200L361 182V234L322 253V200Z" fill="url(#cubeSide)"/>
      <path d="M276 191L313 174L361 182L322 200L276 191Z" fill="url(#cubeTop)"/>

      <!-- pips left -->
      <circle cx="200" cy="192" r="6.5" fill="#121722"/>
      <circle cx="222" cy="236" r="6.5" fill="#121722"/>
      <circle cx="192" cy="223" r="6.5" fill="#121722"/>
      <circle cx="217" cy="201" r="6.5" fill="#121722"/>
      <circle cx="234" cy="216" r="6.5" fill="#121722"/>

      <!-- pips top -->
      <circle cx="198" cy="165" r="6" fill="#121722"/>
      <circle cx="230" cy="154" r="6" fill="#121722"/>
      <circle cx="259" cy="165" r="6" fill="#121722"/>

      <!-- pips right -->
      <circle cx="273" cy="201" r="6" fill="#121722"/>
      <circle cx="288" cy="226" r="6" fill="#121722"/>
      <circle cx="336" cy="196" r="6" fill="#121722"/>
      <circle cx="349" cy="222" r="6" fill="#121722"/>

      <!-- pips small cube -->
      <circle cx="295" cy="208" r="5.5" fill="#121722"/>
      <circle cx="300" cy="236" r="5.5" fill="#121722"/>
      <circle cx="338" cy="213" r="5.5" fill="#121722"/>
    </g>

    <text x="256" y="508"
          text-anchor="middle"
          fill="#FFFFFF"
          font-family="Arial, Helvetica, sans-serif"
          font-size="70"
          font-weight="900">DICE</text>

    <text x="256" y="592"
          text-anchor="middle"
          fill="#F4EEF9"
          fill-opacity="0.95"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18"
          font-weight="700"
          letter-spacing="2.8">TRINITI MODE</text>
  </g>

  <rect x="16" y="16" width="480" height="608" rx="32" stroke="#162B5B" stroke-width="3"/>
</svg>