<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgMain" x1="56" y1="28" x2="452" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4EA1FF"/>
      <stop offset="0.42" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0F2A78"/>
    </linearGradient>

    <radialGradient id="bgGlowTop" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
