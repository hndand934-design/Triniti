    <polygon points="84,14 166,61 90,106 8,59" fill="url(#cubeTopA)"/>
    <polygon points="8,59 90,106 90,214 8,167" fill="url(#cubeFrontA)"/>
    <polygon points="90,106 166,61 166,168 90,214" fill="url(#cubeSideA)"/>

