<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgA" x1="54" y1="32" x2="452" y2="618" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4C95FF"/>
      <stop offset="0.34" stop-color="#2C69D8"/>
      <stop offset="0.72" stop-color="#173A92"/>
      <stop offset="1" stop-color="#0A173F"/>
    </linearGradient>

    <radialGradient id="bgGlow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(348 134) rotate(135) scale(228 148)">
      <stop stop-color="#9CD2FF" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#9CD2FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bgGlow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(158 494) rotate(-24) scale(250 170)">
      <stop stop-color="#6FA8FF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#6FA8FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="frameStroke" x1="28" y1="18" x2="474" y2="628" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8EC6FF" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#8EC6FF" stop-opacity="0.12"/>
    </linearGradient>

    <linearGradient id="shineBand" x1="124" y1="50" x2="388" y2="248" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0"/>
      <stop offset="0.5" stop-color="white" stop-opacity="0.22"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="diceFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDFEFF"/>
      <stop offset="0.28" stop-color="#E7ECF7"/>
      <stop offset="0.72" stop-color="#A6B1C7"/>
      <stop offset="1" stop-color="#68758F"/>
    </linearGradient>

    <linearGradient id="diceTop" x1="0.25" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#EEF3FA"/>
      <stop offset="1" stop-color="#BBC7DA"/>
    </linearGradient>

    <linearGradient id="diceSide" x1="0.08" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3F4A61"/>
      <stop offset="0.42" stop-color="#232C3F"/>
      <stop offset="1" stop-color="#0E1526"/>
    </linearGradient>

    <radialGradient id="diceFrontGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(68 26) rotate(53) scale(84 62)">
      <stop stop-color="white" stop-opacity="0.76"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="dotGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(0 0) scale(1)">
      <stop stop-color="#090D17"/>
      <stop offset="1" stop-color="#1C2230"/>
    </radialGradient>

    <linearGradient id="shadowFade" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop stop-color="#040913" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#040913" stop-opacity="0"/>
    </linearGradient>

    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020611" flood-opacity="0.5"/>
    </filter>

    <filter id="cubeShadowBig" x="-40%" y="-40%" width="180%" height="190%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#030916" flood-opacity="0.52"/>
    </filter>

    <filter id="cubeShadowSmall" x="-40%" y="-40%" width="180%" height="190%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#030916" flood-opacity="0.46"/>
    </filter>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <clipPath id="cardClip">
      <rect x="16" y="16" width="480" height="608" rx="42"/>
    </clipPath>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="16" y="16" width="480" height="608" rx="42" fill="url(#bgA)"/>
    <rect x="16.75" y="16.75" width="478.5" height="606.5" rx="41.25" stroke="url(#frameStroke)" stroke-width="1.5"/>
  </g>

  <g clip-path="url(#cardClip)">
    <rect x="16" y="16" width="480" height="608" rx="42" fill="url(#bgGlow1)"/>
    <rect x="16" y="16" width="480" height="608" rx="42" fill="url(#bgGlow2)"/>

    <g opacity="0.95">
      <path d="M-6 124C70 72 150 68 242 92C336 116 420 92 524 18V80C446 144 352 168 244 148C150 132 80 130 -6 184V124Z"
            fill="white" fill-opacity="0.09"/>
      <path d="M-16 208C92 146 206 150 310 176C392 196 452 188 536 134V222C452 276 386 284 294 256C196 226 96 226 -16 296V208Z"
            fill="white" fill-opacity="0.055"/>
      <path d="M-8 314C92 264 182 270 270 292C364 316 438 314 520 272V356C436 400 354 404 256 378C166 354 92 354 -8 414V314Z"
            fill="white" fill-opacity="0.035"/>
    </g>

    <g opacity="0.34" filter="url(#softBlur)">
      <ellipse cx="248" cy="442" rx="166" ry="30" fill="#071021"/>
      <ellipse cx="315" cy="276" rx="78" ry="20" fill="#061020"/>
    </g>

    <g opacity="0.9">
      <path d="M74 54L202 -36L236 -12L108 78L74 54Z" fill="url(#shineBand)">
        <animateTransform attributeName="transform" type="translate" values="-120 0; 420 0" dur="5.4s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- SMALL BACK DIE -->
    <g transform="translate(292 136) rotate(11)" filter="url(#cubeShadowSmall)">
      <animateTransform attributeName="transform"
        type="translate"
        values="292 136; 292 130; 292 136"
        dur="3.8s"
        repeatCount="indefinite"
        additive="sum"/>

      <polygon points="52,12 116,48 58,84 -6,48" fill="url(#diceTop)"/>
      <polygon points="-6,48 58,84 58,156 -6,120" fill="url(#diceFront)"/>
      <polygon points="58,84 116,48 116,120 58,156" fill="url(#diceSide)"/>

      <ellipse cx="32" cy="24" rx="46" ry="18" fill="url(#diceFrontGlow)" opacity="0.75"/>

      <!-- front 2 -->
      <circle cx="18" cy="76" r="7.4" fill="#101723"/>
      <circle cx="34" cy="126" r="7.4" fill="#101723"/>

      <!-- side 4 -->
      <circle cx="78" cy="88" r="7.4" fill="#0E1320"/>
      <circle cx="96" cy="76" r="7.4" fill="#0E1320"/>
      <circle cx="82" cy="126" r="7.4" fill="#0E1320"/>
      <circle cx="100" cy="114" r="7.4" fill="#0E1320"/>

      <!-- top 1 -->
      <circle cx="52" cy="48" r="7.2" fill="#131A27"/>
    </g>

    <!-- BIG FRONT DIE -->
    <g transform="translate(102 214) rotate(-13)" filter="url(#cubeShadowBig)">
      <animateTransform attributeName="transform"
        type="translate"
        values="102 214; 102 206; 102 214"
        dur="4.6s"
        repeatCount="indefinite"
        additive="sum"/>

      <polygon points="88,18 202,80 100,140 -14,78" fill="url(#diceTop)"/>
      <polygon points="-14,78 100,140 100,292 -14,230" fill="url(#diceFront)"/>
      <polygon points="100,140 202,80 202,232 100,292" fill="url(#diceSide)"/>

      <ellipse cx="64" cy="34" rx="78" ry="28" fill="url(#diceFrontGlow)" opacity="0.86"/>

      <!-- top 6 -->
      <circle cx="20" cy="92" r="9.2" fill="#101723"/>
      <circle cx="62" cy="70" r="9.2" fill="#101723"/>
      <circle cx="108" cy="48" r="9.2" fill="#101723"/>
      <circle cx="64" cy="116" r="9.2" fill="#101723"/>
      <circle cx="110" cy="94" r="9.2" fill="#101723"/>
      <circle cx="154" cy="72" r="9.2" fill="#101723"/>

      <!-- front 2 -->
      <circle cx="24" cy="150" r="10.4" fill="#111826"/>
      <circle cx="64" cy="256" r="10.4" fill="#111826"/>

      <!-- side 4 -->
      <circle cx="130" cy="176" r="9.6" fill="#0D1320"/>
      <circle cx="168" cy="156" r="9.6" fill="#0D1320"/>
      <circle cx="134" cy="248" r="9.6" fill="#0D1320"/>
      <circle cx="172" cy="226" r="9.6" fill="#0D1320"/>
    </g>

    <ellipse cx="236" cy="492" rx="174" ry="34" fill="url(#shadowFade)" opacity="0.72"/>
  </g>
</svg>