    <path d="M398 318C378 334 350 344 316 344C286 344 262 336 242 320C222 304 196 296 166 296C150 296 136 298 122 302"
          stroke="rgba(255,255,255,0.72)" stroke-width="16" stroke-linecap="round" fill="none"/>
  </g>

  <!-- back cube -->
