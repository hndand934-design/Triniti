  <path d="M37 27.2L34.4 26.1L35 28.8L37.5 29.2Z" fill="#EAF1F6"/>
  <circle cx="27.9" cy="28.1" r="0.95" fill="#0A0F15"/>
  <circle cx="36.1" cy="28.1" r="0.95" fill="#0A0F15"/>

  <!-- wall -->
  <rect x="10" y="37" width="44" height="8" rx="2" fill="url(#towerIconWall2)"/>
  <rect x="8" y="43" width="48" height="12" rx="3" fill="#596372"/>

  <path d="M17 37V55" stroke="#46515F" stroke-width="1.7"/>
  <path d="M25 37V55" stroke="#46515F" stroke-width="1.7"/>
  <path d="M39 37V55" stroke="#46515F" stroke-width="1.7"/>
  <path d="M47 37V55" stroke="#46515F" stroke-width="1.7"/>

