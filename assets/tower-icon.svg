<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="towerIconBg2" x1="32" y1="4" x2="32" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08131E"/>
      <stop offset="0.55" stop-color="#0B1B2B"/>
      <stop offset="1" stop-color="#26172B"/>
    </linearGradient>

    <linearGradient id="towerIconDragon2" x1="32" y1="14" x2="32" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A3B2C3"/>
      <stop offset="1" stop-color="#4B5667"/>
    </linearGradient>

    <linearGradient id="towerIconWing2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#718094"/>
      <stop offset="1" stop-color="#2A3340"/>
    </linearGradient>

    <linearGradient id="towerIconWall2" x1="32" y1="36" x2="32" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8090A0"/>
      <stop offset="1" stop-color="#525C69"/>
    </linearGradient>

    <filter id="towerIconShadow2" x="0" y="0" width="64" height="64" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#05080D" flood-opacity="0.34"/>
    </filter>
  </defs>

  <g filter="url(#towerIconShadow2)">
    <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#towerIconBg2)"/>
  </g>

  <!-- moon haze -->
  <circle cx="45" cy="17" r="9" fill="#D2E5FF" fill-opacity="0.07"/>

  <!-- wings -->
  <path d="M19 28C15.2 25.4 13.6 21 14.8 16.8C18.9 18.4 23.4 22 26.2 29C23.7 29.3 21 29.1 19 28Z" fill="url(#towerIconWing2)"/>
  <path d="M45 28C48.8 25.4 50.4 21 49.2 16.8C45.1 18.4 40.6 22 37.8 29C40.3 29.3 43 29.1 45 28Z" fill="url(#towerIconWing2)"/>

  <!-- horns -->
  <path d="M28.4 17L25.4 12L29 14.5Z" fill="#C2CDD7"/>
  <path d="M35.6 17L38.6 12L35 14.5Z" fill="#C2CDD7"/>

  <!-- head -->
  <path d="M32 16
