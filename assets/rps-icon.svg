<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rpsIconBg" x1="32" y1="4" x2="32" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF165D"/>
      <stop offset="0.52" stop-color="#FF4B49"/>
      <stop offset="1" stop-color="#FFB13B"/>
    </linearGradient>

    <linearGradient id="rpsGold" x1="28" y1="10" x2="36" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE96C"/>
      <stop offset="0.5" stop-color="#FFC933"/>
      <stop offset="1" stop-color="#FF9800"/>
    </linearGradient>

    <linearGradient id="rpsWhite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D9DEE8"/>
    </linearGradient>

    <linearGradient id="rpsStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C7CFDB"/>
      <stop offset="1" stop-color="#9EA7B8"/>
    </linearGradient>

    <filter id="iconSh" x="0" y="0" width="64" height="64" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#5E1825" flood-opacity="0.24"/>
    </filter>
  </defs>

  <g filter="url(#iconSh)">
    <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#rpsIconBg)"/>
  </g>

  <!-- crown -->
  <path d="M29 18L26 13L29.5 14.4L32 10L34.5 14.4L38 13L35 18H29Z" fill="url(#rpsGold)"/>
  <rect x="28" y="18" width="8" height="3.5" rx="1.75" fill="url(#rpsGold)"/>

  <!-- rock -->
  <g transform="translate(9 25)">
    <path d="M4 17C4 11.8 7.8 8 13 8H18C23.2 8 27 11.8 27 17V22C27 26.4 23.4 30 19 30H12C7.6 30 4 26.4 4 22V17Z"
          fill="url(#rpsWhite)" stroke="url(#rpsStroke)" stroke-width="1.6"/>
    <path d="M8 9V4C8 1.8 9.8 0 12 0C14.2 0 16 1.8 16 4V9" fill="url(#rpsWhite)" stroke="url(#rpsStroke)" stroke-width="1.6"/>
    <path d="M15 8V3C15 1.2 16.6 0 18.3 0C20.2 0 21.5 1.4 21.5 3.2V8" fill="url(#rpsWhite)" stroke="url(#rpsStroke)" stroke-width="1.6"/>
  </g>

  <!-- scissors -->
  <g transform="translate(24 26)">
    <circle cx="6" cy="20" r="4.8" fill="url(#rpsWhite)" stroke="url(#rpsStroke)" stroke-width="1.6"/>
    <circle cx="15.5" cy="20" r="4.8" fill="url(#rpsWhite)" stroke="url(#rpsStroke)" stroke-width="1.6"/>
    <path d="M8.5 17L19 7.2C20.6 5.8 22.8 5.9 24.2 7.4C25.6 9 25.5 11.2 24 12.6L13.5 22.4"
          fill="url(#rpsWhite)" stroke="url(#rpsStroke)" stroke-width="1.6"/>
    <path d="M12.2 17.1L6.6 7.1C5.6 5.5 6.1 3.4 7.8 2.5C9.5 1.5 11.5 2 12.4 3.7L17.2 12.8"
          fill="url(#rpsWhite)" stroke="url(#rpsStroke)" stroke-width="1.6"/>
  </g>

  <rect x="4.5" y="4.5" width="55" height="55" rx="15.5" stroke="#7A2941"/>
</svg>