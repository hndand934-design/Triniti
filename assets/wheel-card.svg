<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="wheelCardClip">
      <rect x="12" y="12" width="488" height="616" rx="36"/>
    </clipPath>

    <linearGradient id="wheelBg" x1="78" y1="44" x2="430" y2="612" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EA73F8"/>
      <stop offset="0.34" stop-color="#B83EF6"/>
      <stop offset="0.7" stop-color="#93E643"/>
      <stop offset="1" stop-color="#F0D85A"/>
    </linearGradient>

    <radialGradient id="wheelBgGlowTop" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(270 120) rotate(90) scale(220 250)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="wheelCenterGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(258 250) rotate(90) scale(120 120)">
      <stop offset="0" stop-color="#FF7BFF" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#FF7BFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="rimOuter" x1="148" y1="132" x2="368" y2="352" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF073"/>
      <stop offset="0.52" stop-color="#D4FF40"/>
      <stop offset="1" stop-color="#8ED123"/>
    </linearGradient>

    <linearGradient id="rimInner" x1="152" y1="140" x2="360" y2="348" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6E6E6E"/>
      <stop offset="1" stop-color="#484848"/>
    </linearGradient>

    <linearGradient id="wheelRed" x1="176" y1="176" x2="336" y2="336" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF7E67"/>
      <stop offset="1" stop-color="#E95443"/>
    </linearGradient>

    <linearGradient id="wheelBlue" x1="176" y1="176" x2="336" y2="336" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7FEFFF"/>
      <stop offset="1" stop-color="#59C7DE"/>
    </linearGradient>

    <linearGradient id="wheelGreen" x1="176" y1="176" x2="336" y2="336" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#97C65B"/>
      <stop offset="1" stop-color="#6F9841"/>
    </linearGradient>

    <linearGradient id="pegGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF0B3"/>
      <stop offset="0.5" stop-color="#FFD84D"/>
      <stop offset="1" stop-color="#D49A15"/>
    </linearGradient>

    <linearGradient id="pointerGold" x1="34" y1="12" x2="96" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF27F"/>
      <stop offset="0.6" stop-color="#FFD83C"/>
      <stop offset="1" stop-color="#CFA317"/>
    </linearGradient>

    <linearGradient id="tagGreen" x1="0" y1="0" x2="96" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B6FF52"/>
      <stop offset="1" stop-color="#62D64A"/>
    </linearGradient>

    <linearGradient id="tagBlue" x1="0" y1="0" x2="96" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7FE8FF"/>
      <stop offset="1" stop-color="#58C5E6"/>
    </linearGradient>

    <linearGradient id="titleFillWheel" x1="256" y1="450" x2="256" y2="612" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F3E8"/>
    </linearGradient>

    <filter id="cardShadowWheel" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#05070E" flood-opacity="0.42"/>
    </filter>

    <filter id="wheelShadow" x="96" y="110" width="320" height="292" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#203400" flood-opacity="0.30"/>
    </filter>

    <filter id="tagShadow" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.22"/>
    </filter>

    <filter id="textShadowWheel" x="0" y="0" width="512" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="3.5" flood-color="#4D4D2B" flood-opacity="0.26"/>
    </filter>
  </defs>

  <g filter="url(#cardShadowWheel)">
    <rect x="12" y="12" width="488" height="616" rx="36" fill="url(#wheelBg)"/>
  </g>

  <g clip-path="url(#wheelCardClip)">
    <ellipse cx="270" cy="120" rx="250" ry="170" fill="url(#wheelBgGlowTop)"/>
    <ellipse cx="258" cy="250" rx="120" ry="118" fill="url(#wheelCenterGlow)"/>

    <path d="M12 360C124 332 388 332 500 362V628H12V360Z" fill="#A8F045" fill-opacity="0.18"/>
    <path d="M34 82C128 40 360 44 470 120" stroke="white" stroke-opacity="0.10" stroke-width="28" stroke-linecap="round"/>
    <path d="M80 46C194 10 350 18 456 84" stroke="white" stroke-opacity="0.07" stroke-width="18" stroke-linecap="round"/>

    <!-- wheel -->
    <g filter="url(#wheelShadow)">
      <circle cx="258" cy="255" r="124" fill="url(#rimOuter)"/>
      <circle cx="258" cy="255" r="113" fill="url(#rimInner)"/>

      <!-- segments -->
      <path d="M258 255L258 154A101 101 0 0 1 338.5 194.5L258 255Z" fill="url(#wheelBlue)"/>
      <path d="M258 255L338.5 194.5A101 101 0 0 1 350 286L258 255Z" fill="url(#wheelRed)"/>
      <path d="M258 255L350 286A101 101 0 0 1 292 350L258 255Z" fill="url(#wheelGreen)"/>
      <path d="M258 255L292 350A101 101 0 0 1 195 331L258 255Z" fill="url(#wheelBlue)"/>
      <path d="M258 255L195 331A101 101 0 0 1 161 228L258 255Z" fill="url(#wheelRed)"/>
      <path d="M258 255L161 228A101 101 0 0 1 258 154L258 255Z" fill="url(#wheelGreen)"/>

      <!-- gold ring -->
      <circle cx="258" cy="255" r="101.5" stroke="#F6DA53" stroke-width="6"/>
      <circle cx="258" cy="255" r="58" fill="#B83EF6"/>
      <circle cx="258" cy="255" r="58" stroke="#F1D14E" stroke-width="7"/>

      <!-- pegs -->
      <g fill="url(#pegGold)">
        <circle cx="258" cy="146" r="8"/>
        <circle cx="340" cy="180" r="8"/>
        <circle cx="369" cy="257" r="8"/>
        <circle cx="332" cy="335" r="8"/>
        <circle cx="255" cy="364" r="8"/>
        <circle cx="178" cy="333" r="8"/>
        <circle cx="145" cy="255" r="8"/>
        <circle cx="178" cy="177" r="8"/>
      </g>

      <!-- center shine -->
      <ellipse cx="239" cy="221" rx="46" ry="28" fill="white" fill-opacity="0.08"/>
    </g>

    <!-- pointer -->
    <g filter="url(#tagShadow)">
      <path d="M48 326C48 315 57 306 68 306H114C125 306 134 315 134 326C134 337 125 346 114 346H86L60 370C55 374 48 370 48 363V346C39 344 34 337 34 326C34 315 39 308 48 306Z" fill="url(#pointerGold)"/>
      <circle cx="54" cy="326" r="11" fill="#8B6F0D" fill-opacity="0.35"/>
      <circle cx="54" cy="326" r="7" fill="#FFF1A0" fill-opacity="0.45"/>
    </g>

    <!-- x50 tag -->
    <g filter="url(#tagShadow)" transform="translate(58 110) rotate(-6)">
      <rect x="0" y="0" width="104" height="70" rx="18" fill="url(#tagGreen)"/>
      <rect x="2" y="2" width="100" height="66" rx="16" stroke="black" stroke-opacity="0.10" stroke-width="2"/>
      <text x="52" y="46" text-anchor="middle" fill="#35564B" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="900">x50</text>
    </g>

    <!-- x5 tag -->
    <g filter="url(#tagShadow)" transform="translate(326 338) rotate(7)">
      <rect x="0" y="0" width="104" height="70" rx="18" fill="url(#tagBlue)"/>
      <rect x="2" y="2" width="100" height="66" rx="16" stroke="black" stroke-opacity="0.10" stroke-width="2"/>
      <text x="52" y="46" text-anchor="middle" fill="#4C5A9A" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="900">x5</text>
    </g>

    <!-- title -->
    <g filter="url(#textShadowWheel)">
      <text x="256" y="530"
            text-anchor="middle"
            fill="url(#titleFillWheel)"
            font-family="Arial, Helvetica, sans-serif"
            font-size="74"
            font-weight="900"
            letter-spacing="1">WHEEL</text>
    </g>

    <g opacity="0.96">
      <path d="M160 565H352L372 585L352 605H160L140 585L160 565Z" fill="none" stroke="#F8F1D7" stroke-opacity="0.8" stroke-width="2.2"/>
      <text x="256" y="592"
            text-anchor="middle"
            fill="#FFF9E9"
            font-family="Arial, Helvetica, sans-serif"
            font-size="22"
            font-weight="700"
            letter-spacing="2.2">TRINITI MODE</text>
    </g>
  </g>

  <rect x="16" y="16" width="480" height="608" rx="32" stroke="#1C2430" stroke-width="3"/>
</svg>