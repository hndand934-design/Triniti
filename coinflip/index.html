<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Triniti — Coin Flip</title>

  <link rel="stylesheet" href="../shared/theme.css">
  <script src="../shared/wallet.js" defer></script>

  <link rel="stylesheet" href="./style.css" />
  <script src="./app.js" defer></script>
</head>
<body>
  <div class="bg"></div>
  <div class="noise" aria-hidden="true"></div>

  <div class="app">
    <header class="topbar">
      <a class="backBtn pressable" href="../">←</a>

      <div class="brandWrap">
        <div class="brandLogo" aria-hidden="true">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="coinflipGoldDesktop" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#f8e8b2"/>
                <stop offset="48%" stop-color="#e0c26f"/>
                <stop offset="100%" stop-color="#b78f46"/>
              </linearGradient>
            </defs>
            <rect x="10" y="10" width="44" height="44" rx="14"
                  fill="rgba(255,255,255,.04)"
                  stroke="url(#coinflipGoldDesktop)"
                  stroke-width="2.2"/>
            <path d="M21 20H43L39.5 25H34V41L32 45L30 41V25H24.5L21 20Z"
                  fill="url(#coinflipGoldDesktop)"/>
          </svg>
        </div>

        <div class="brandText">
          <div class="brandTitle">Triniti</div>
          <div class="brandSub">Coin Flip</div>
        </div>
      </div>

      <button id="soundBtn" class="iconBtn pressable" type="button" aria-label="Звук">
        <span class="dot"></span>
      </button>

      <div class="balancePill">🪙 <b id="balance">1000</b></div>
    </header>

    <main class="screen">
      <section class="hero card">
        <div class="heroTop">
          <div class="pickRow">
            <button id="pickEagle" class="pick pick--gold pressable active" type="button">
              <span class="mark mark--gold"></span>
              <span>Орёл</span>
            </button>

            <button id="pickTail" class="pick pick--silver pressable" type="button">
              <span class="mark mark--silver"></span>
              <span>Решка</span>
            </button>
          </div>

          <div class="rulePill"><b id="statusView">Готов</b></div>
        </div>

        <section class="statsGrid">
          <div class="statCard">
            <div class="statCard__value"><b id="pickView">Орёл</b></div>
            <div class="statCard__label">Выбор</div>
          </div>

          <div class="statCard">
            <div class="statCard__value"><b id="betView">50</b></div>
            <div class="statCard__label">Ставка</div>
          </div>

          <div class="statCard">
            <div class="statCard__value"><b id="winView">+50</b></div>
            <div class="statCard__label">Выигрыш</div>
          </div>
        </section>

        <section class="arenaCard">
          <div class="arenaTop">
            <div class="miniInfo">Выбор: <b id="miniPickView">Орёл</b></div>
            <div class="miniInfo">Монета: <b id="coinStateView">Фиолетовая</b></div>
          </div>

          <div class="coinStage">
            <div class="coinGlow coinGlow--left"></div>
            <div class="coinGlow coinGlow--right"></div>

            <div class="coinWrap" aria-label="coin arena">
              <div id="coin" class="coin3d coin3d--purple" aria-label="coin">
                <div class="coinFace coinFace--front"></div>
                <div class="coinEdge"></div>
                <div class="coinFace coinFace--back"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="betCard">
          <div class="chips">
            <button class="chip pressable" data-bet="10" type="button">10</button>
            <button class="chip pressable" data-bet="50" type="button">50</button>
            <button class="chip pressable" data-bet="100" type="button">100</button>
            <button class="chip pressable" data-bet="250" type="button">250</button>
            <button class="chip pressable" data-bet="500" type="button">500</button>
            <button class="chip pressable" data-bet="max" type="button">MAX</button>
          </div>

          <div class="betRow">
            <button id="betMinus" class="btnSmall pressable" type="button">−</button>
            <input id="betInput" class="betInput" type="number" min="1" step="1" value="50" />
            <button id="betPlus" class="btnSmall pressable" type="button">+</button>
          </div>

          <div class="actionRow">
            <button id="bonusBtn2" class="bonusMini pressable" type="button">+1000</button>
            <button id="flipBtn" class="btnPrimary pressable" type="button">Бросить</button>
          </div>
        </section>
      </section>
    </main>
  </div>
</body>
</html>
