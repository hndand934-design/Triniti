<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Triniti — Dice</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg"></div>
  <div class="noise" aria-hidden="true"></div>

  <div class="app">
    <header class="topbar">
      <a class="backBtn pressable" href="../">←</a>

      <div class="brandWrap">
        <div class="brandLogo" aria-hidden="true">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="diceGoldDesktop" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#f8e8b2"/>
                <stop offset="48%" stop-color="#e0c26f"/>
                <stop offset="100%" stop-color="#b78f46"/>
              </linearGradient>
            </defs>
            <rect x="10" y="10" width="44" height="44" rx="14"
                  fill="rgba(255,255,255,.04)"
                  stroke="url(#diceGoldDesktop)"
                  stroke-width="2.2"/>
            <path d="M21 20H43L39.5 25H34V41L32 45L30 41V25H24.5L21 20Z"
                  fill="url(#diceGoldDesktop)"/>
          </svg>
        </div>

        <div class="brandText">
          <div class="brandTitle">Triniti</div>
          <div class="brandSub">Dice</div>
        </div>
      </div>

      <button id="soundBtn" class="iconBtn pressable" type="button" aria-label="Звук">
        <span class="dot"></span>
      </button>

      <div class="balancePill">🪙 <b id="balance">1000</b></div>
    </header>

    <main class="screen">
      <section class="hero card">
        <div class="heroTop">
          <div class="modeRow">
            <button id="btnLess" class="seg pressable active" type="button">Меньше</button>
            <button id="btnMore" class="seg pressable" type="button">Больше</button>
          </div>

          <div id="rulePill" class="rulePill">≤ 1</div>
        </div>

        <section class="statsGrid">
          <div class="statCard">
            <div class="statCard__value"><b id="multView">x1.18</b></div>
            <div class="statCard__label">X</div>
          </div>

          <div class="statCard">
            <div class="statCard__value"><b id="profitView">+0</b></div>
            <div class="statCard__label">Выигрыш</div>
          </div>

          <div class="statCard">
            <div class="statCard__value"><b id="chanceView">83.3%</b></div>
            <div class="statCard__label">Шанс</div>
          </div>
        </section>

        <section class="arenaCard">
          <div class="arenaTop">
            <div class="miniInfo">Порог: <b id="thrView">2</b>/6</div>
            <div class="miniInfo">Выпало: <b id="rolledView">—</b></div>
          </div>

          <input id="thrRange" class="range" type="range" min="2" max="6" step="1" value="2" />

          <div class="cubeStage">
            <div class="cubeView">
              <div id="cube" class="cube">
                <div class="face face--front"  data-face="front"></div>
                <div class="face face--back"   data-face="back"></div>
                <div class="face face--right"  data-face="right"></div>
                <div class="face face--left"   data-face="left"></div>
                <div class="face face--top"    data-face="top"></div>
                <div class="face face--bottom" data-face="bottom"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="betCard">
          <div class="chips">
            <button class="chip pressable" data-bet="10" type="button">10</button>
            <button class="chip pressable" data-bet="50" type="button">50</button>
            <button class="chip pressable" data-bet="100" type="button">100</button>
            <button class="chip pressable" data-bet="250" type="button">250</button>
            <button class="chip pressable" data-bet="500" type="button">500</button>
            <button class="chip pressable" data-bet="max" type="button">MAX</button>
          </div>

          <div class="betRow">
            <button id="betMinus" class="btnSmall pressable" type="button">−</button>
            <input id="betInput" class="betInput" type="number" min="1" step="1" value="100" />
            <button id="betPlus" class="btnSmall pressable" type="button">+</button>
          </div>

          <div class="actionRow">
            <button id="bonusBtn2" class="bonusMini pressable" type="button">+1000</button>
            <button id="rollBtn" class="btnPrimary pressable" type="button">Бросить</button>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./app.js"></script>
</body>
</html>
